<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣格鬥遊戲</title>
<style>
:root {
  --bg:        #0d0d12;
  --bg-card:   #14141d;
  --bg-card2:  #1c1c28;
  --accent:    #e8433a;
  --accent2:   #ff6b35;
  --live:      #22c55e;
  --text:      #eeecf0;
  --text-sub:  #8e8c9a;
  --text-dim:  #4e4c5c;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.14);
  --r:         12px;
  --r-sm:      8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
  line-height: 1.6; padding-bottom: 72px; overflow-x: hidden;
}

/* ── HEADER ── */
#hdr {
  position: sticky; top: 0; z-index: 200;
  background: rgba(13,13,18,0.9); backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  transition: transform .28s ease;
}
#hdr.hide { transform: translateY(-100%); }
.hdr-inner {
  max-width: 680px; margin: 0 auto;
  padding: 0 18px; height: 54px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 9px; text-decoration: none; color: inherit; cursor: pointer; }
.logo-mark {
  width: 32px; height: 32px; border-radius: 7px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: #fff;
}
.logo-name { font-size: 16px; font-weight: 700; letter-spacing: .02em; }
.logo-name em { font-style: normal; color: var(--accent); }
.page-title { font-size: 15px; font-weight: 600; color: var(--text-sub); }

/* ── BOTTOM NAV ── */
#bnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: rgba(13,13,18,0.96); backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--border);
  height: 60px; display: flex; align-items: center; justify-content: space-around;
}
.bnav-btn {
  flex: 1; height: 100%; border: none; background: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-dim); transition: color .15s;
}
.bnav-btn.active { color: var(--accent); }
.bnav-btn svg { width: 22px; height: 22px; }

/* ── PAGE SYSTEM ── */
.page { display: none; max-width: 680px; margin: 0 auto; padding: 20px 16px 20px; }
.page.active { display: flex; flex-direction: column; gap: 28px; }

/* ── SECTION LABELS ── */
.sec-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.sec-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
  color: var(--text-sub); display: flex; align-items: center; gap: 8px;
}
.sec-label::before {
  content: ''; display: block; width: 3px; height: 13px;
  background: var(--accent); border-radius: 2px; flex-shrink: 0;
}
.sec-label.green::before { background: var(--live); }
.more-btn {
  font-size: 11px; color: var(--text-dim); text-decoration: none;
  transition: color .15s;
}
.more-btn:hover { color: var(--text-sub); }

/* ── TAB BAR ── */
.tab-bar {
  display: flex; gap: 4px; background: var(--bg-card2);
  border-radius: var(--r-sm); padding: 3px; margin-bottom: 16px;
}
.tab-btn {
  flex: 1; padding: 8px 0; border: none; cursor: pointer;
  background: none; border-radius: 6px;
  font-size: 13px; font-weight: 600; color: var(--text-dim);
  transition: background .15s, color .15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.tab-btn.active { background: var(--bg-card); color: var(--text); }
.live-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--live);
  animation: blink 1.8s infinite;
}
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

/* ── TOGGLE SWITCH ── */
.toggle-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--r-sm);
  margin-bottom: 14px; cursor: pointer; user-select: none;
}
.toggle-row span { font-size: 13px; color: var(--text-sub); flex: 1; }
.toggle-row span strong { color: var(--text); font-weight: 600; }
.sw {
  width: 40px; height: 22px; border-radius: 11px;
  background: var(--bg-card2); border: 1px solid var(--border);
  position: relative; transition: background .2s; flex-shrink: 0;
}
.sw::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--text-dim); transition: left .2s, background .2s;
}
.toggle-row.on .sw { background: rgba(232,67,58,.25); border-color: rgba(232,67,58,.4); }
.toggle-row.on .sw::after { left: 21px; background: var(--accent); }

/* ── CAROUSEL ── */
.carousel-wrap {
  border-radius: var(--r); overflow: hidden;
  position: relative; aspect-ratio: 2/1;
  background: var(--bg-card2); cursor: pointer;
}
.c-slide {
  position: absolute; inset: 0; opacity: 0;
  transition: opacity .55s ease;
  display: flex; align-items: flex-end;
  text-decoration: none; color: inherit;
}
.c-slide.on { opacity: 1; }
.c-slide img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.c-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.1) 55%, transparent 100%);
}
.c-text { position: relative; z-index: 1; padding: 14px 16px; width: 100%; }
.c-tag {
  display: inline-block; background: var(--accent); color: #fff;
  font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px; margin-bottom: 5px;
}
.c-title { font-size: 15px; font-weight: 700; line-height: 1.3; color: #fff; }
.c-dots {
  position: absolute; bottom: 10px; right: 12px; z-index: 2; display: flex; gap: 5px;
}
.c-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,.3); border: none; cursor: pointer;
  transition: background .2s, width .2s;
}
.c-dot.on { background: #fff; width: 14px; border-radius: 3px; }
.carousel-ph {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 13px;
}

/* ── MATCH CARDS ── */
.match-list { display: flex; flex-direction: column; gap: 10px; }
.match-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
  position: relative; overflow: hidden; cursor: pointer;
  transition: border-color .18s, transform .15s;
}
.match-card::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--accent); border-radius: 3px 0 0 3px;
}
.match-card.ongoing::after { background: var(--live); }
.match-card:hover { border-color: var(--border-hi); transform: translateY(-1px); }

.match-chips { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.chip {
  font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
}
.chip-live   { background: rgba(34,197,94,.15);  color: var(--live); }
.chip-region { background: rgba(255,255,255,.06); color: var(--text-sub); }
.chip-tw     { background: rgba(232,67,58,.12);   color: var(--accent); }

.match-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; line-height: 1.35; }
.match-meta {
  display: flex; flex-wrap: wrap; gap: 10px;
  font-size: 11px; color: var(--text-sub); margin-bottom: 10px;
}
.mm { display: flex; align-items: center; gap: 4px; }
.mm svg { width: 12px; height: 12px; opacity: .55; flex-shrink: 0; }

.game-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.gtag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
.g-sf6  { background: rgba(232,67,58,.15);   color: #e8433a; }
.g-t8   { background: rgba(245,166,35,.15);  color: #f5a623; }
.g-gg   { background: rgba(100,149,237,.15); color: #6495ed; }
.g-ff   { background: rgba(34,197,94,.15);   color: #22c55e; }
.g-misc { background: rgba(255,255,255,.07); color: var(--text-sub); }

.match-foot { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.sg-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; color: var(--accent2);
  text-decoration: none; padding: 5px 10px;
  border: 1px solid rgba(255,107,53,.3); border-radius: 5px;
  transition: background .15s, border-color .15s;
}
.sg-link:hover { background: rgba(255,107,53,.1); border-color: rgba(255,107,53,.6); }
.expand-btn {
  background: none; border: none; cursor: pointer;
  font-size: 11px; color: var(--text-dim);
  display: flex; align-items: center; gap: 3px;
  padding: 4px 6px; border-radius: 4px; transition: color .15s, background .15s;
}
.expand-btn:hover { color: var(--text-sub); background: var(--bg-card2); }
.expand-btn svg { width: 13px; height: 13px; transition: transform .2s; }
.expand-btn.open svg { transform: rotate(180deg); }
.match-detail {
  display: none; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 13px; color: var(--text-sub); line-height: 1.75; white-space: pre-wrap;
}
.match-card.expanded .match-detail { display: block; }

/* ── STREAM CARDS ── */
.stream-list { display: flex; flex-direction: column; gap: 10px; }
.stream-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  display: flex; text-decoration: none; color: inherit;
  transition: border-color .18s, transform .15s; cursor: pointer;
}
.stream-card:hover { border-color: var(--border-hi); transform: translateY(-1px); }
.stream-card.is-live { border-color: rgba(34,197,94,.25); }

.s-thumb {
  width: 110px; height: 62px; flex-shrink: 0;
  background: var(--bg-card2); position: relative; overflow: hidden;
}
.s-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.s-thumb-ph {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 20px;
}
.s-avatar {
  width: 100%; height: 100%; object-fit: cover; display: block;
  border-radius: 0;
}
.live-badge {
  position: absolute; top: 5px; left: 5px;
  background: var(--accent); color: #fff;
  font-size: 8px; font-weight: 700; letter-spacing: .08em;
  padding: 1px 5px; border-radius: 3px; text-transform: uppercase;
}
.s-info { padding: 10px 12px; flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.s-name { font-size: 14px; font-weight: 600; }
.s-game { font-size: 11px; color: var(--text-sub); }
.s-stream-title { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.s-platform {
  font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  margin-top: auto; padding-top: 3px;
}
.pt { color: #9146ff; }
.py { color: #ff6060; }

/* ── STATES ── */
.empty { padding: 28px 0; text-align: center; font-size: 13px; color: var(--text-dim); }
.loading { display: flex; align-items: center; gap: 10px; padding: 24px 0; font-size: 13px; color: var(--text-dim); }
.spin {
  width: 15px; height: 15px; border-radius: 50%;
  border: 2px solid var(--border); border-top-color: var(--accent);
  animation: rot .7s linear infinite; flex-shrink: 0;
}
@keyframes rot { to { transform: rotate(360deg); } }

/* ── HOME live section ── */
#home-live { display: none; }
.stream-tabs-grid { display: flex; flex-direction: column; gap: 10px; }

/* home stream featured */
.stream-feat {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden; text-decoration: none; color: inherit;
  display: block; transition: border-color .18s;
}
.stream-feat:hover { border-color: var(--border-hi); }
.stream-feat.is-live { border-color: rgba(34,197,94,.3); }
.sf-thumb {
  width: 100%; aspect-ratio: 16/9;
  background: var(--bg-card2); position: relative; overflow: hidden;
}
.sf-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sf-thumb-ph {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 40px;
}
.sf-info { padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; }
.sf-name { font-size: 17px; font-weight: 600; }
.sf-game { font-size: 13px; color: var(--text-sub); }
.sf-title { font-size: 12px; color: var(--text-dim); }
.sf-goto {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
  background: var(--accent); color: #fff;
  font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 7px;
  text-decoration: none; width: fit-content; transition: background .15s;
}
.sf-goto:hover { background: var(--accent2); }

.stream-smalls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.stream-small {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r-sm); overflow: hidden;
  text-decoration: none; color: inherit;
  transition: border-color .18s;
}
.stream-small:hover { border-color: var(--border-hi); }
.stream-small.is-live { border-color: rgba(34,197,94,.2); }
.ss-thumb {
  width: 100%; aspect-ratio: 16/9;
  background: var(--bg-card2); position: relative; overflow: hidden;
}
.ss-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ss-thumb-ph {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 20px;
}
.ss-info { padding: 7px 9px; }
.ss-name { font-size: 12px; font-weight: 600; }
.ss-game { font-size: 10px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

@media (max-width: 400px) {
  .stream-smalls { grid-template-columns: 1fr 1fr; }
  main { padding: 16px 12px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header id="hdr">
  <div class="hdr-inner">
    <div class="logo" onclick="navTo('home')">
      <div class="logo-mark">拳</div>
      <div class="logo-name">台灣<em>格鬥</em></div>
    </div>
    <div class="page-title" id="hdr-title"></div>
  </div>
</header>

<!-- ══════════════════════════════════
     PAGE: 首頁
══════════════════════════════════ -->
<div class="page active" id="page-home">

  <!-- 觀賽直播（有進行中賽事才顯示） -->
  <section id="home-live">
    <div class="sec-row">
      <div class="sec-label green">觀賽直播</div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="cowatch" onclick="homeTab('cowatch')">
        <span class="live-dot"></span>觀賽直播
      </button>
      <button class="tab-btn" data-tab="official" onclick="homeTab('official')">賽事主台</button>
    </div>
    <div id="home-cowatch"></div>
    <div id="home-official" style="display:none"></div>
  </section>

  <!-- 橫幅輪播 -->
  <section>
    <div class="carousel-wrap" id="home-carousel" style="aspect-ratio:2/1">
      <div class="carousel-ph"><div class="spin"></div></div>
    </div>
  </section>

  <!-- 現正進行中 -->
  <section id="home-ongoing-sec">
    <div class="sec-label green" style="margin-bottom:12px">現正進行中</div>
    <div class="match-list" id="home-ongoing"><div class="loading"><div class="spin"></div>載入賽事…</div></div>
  </section>

  <!-- 近期賽事 -->
  <section>
    <div class="sec-row">
      <div class="sec-label">近期賽事</div>
      <span class="more-btn" onclick="navTo('events')" style="cursor:pointer">完整賽程 →</span>
    </div>
    <div class="match-list" id="home-upcoming"><div class="loading"><div class="spin"></div>載入賽事…</div></div>
  </section>

</div>

<!-- ══════════════════════════════════
     PAGE: 實況列表
══════════════════════════════════ -->
<div class="page" id="page-streams">
  <section>
    <div class="sec-label green" style="margin-bottom:14px">正在直播格鬥遊戲</div>
    <div class="stream-list" id="streams-live"><div class="loading"><div class="spin"></div>偵測直播中…</div></div>
  </section>
  <section>
    <div class="sec-label" style="margin-bottom:14px">全部實況台</div>
    <div class="stream-list" id="streams-all"></div>
  </section>
</div>

<!-- ══════════════════════════════════
     PAGE: 賽事列表
══════════════════════════════════ -->
<div class="page" id="page-events">

  <!-- 頁籤 -->
  <div style="margin-bottom:0">
    <div class="tab-bar">
      <button class="tab-btn active" data-etab="focus" onclick="eventsTab('focus')">焦點大賽</button>
      <button class="tab-btn" data-etab="community" onclick="eventsTab('community')">社群＆聯賽</button>
    </div>
  </div>

  <!-- 焦點大賽 -->
  <div id="etab-focus">
    <!-- 台灣選手開關 -->
    <div class="toggle-row" id="tw-toggle" onclick="toggleTW()">
      <span>只看<strong>有台灣選手</strong>的賽事</span>
      <div class="sw"></div>
    </div>
    <div class="match-list" id="focus-list"><div class="loading"><div class="spin"></div>載入賽事…</div></div>
  </div>

  <!-- 社群＆聯賽 -->
  <div id="etab-community" style="display:none">
    <!-- 輪播（社群活動宣傳） -->
    <div class="carousel-wrap" id="community-carousel" style="margin-bottom:16px">
      <div class="carousel-ph"><div class="spin"></div></div>
    </div>
    <div class="match-list" id="community-list"><div class="loading"><div class="spin"></div>載入賽事…</div></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav id="bnav">
  <button class="bnav-btn" id="btn-streams" onclick="navTo('streams')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="2"/>
      <path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M7.76 7.76a6 6 0 0 0 0 8.49"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
    </svg>
  </button>
  <button class="bnav-btn active" id="btn-home" onclick="navTo('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
      <path d="M9 21V12h6v9"/>
    </svg>
  </button>
  <button class="bnav-btn" id="btn-events" onclick="navTo('events')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
  </button>
</nav>

<script>
// ══════════════════════════════
// CONFIG
// ══════════════════════════════
const SHEET_ID = '1MBU9FQYsPqEwSgdAjmfxzOETK8vmBPY_JeNkP6vNgCw';

const GAME_CLASS = {
  'SF6':'g-sf6','Street Fighter 6':'g-sf6','快打旋風6':'g-sf6','快打6':'g-sf6',
  '鐵拳8':'g-t8','Tekken 8':'g-t8','T8':'g-t8',
  'GGST':'g-gg','Guilty Gear':'g-gg','Strive':'g-gg','罪惡裝備':'g-gg',
  'Fatal Fury':'g-ff','CotW':'g-ff','餓狼傳說':'g-ff','FATCOW':'g-ff',
};

// 格鬥遊戲關鍵字（未來 Twitch API 串接用）
const FGC_KEYWORDS = [
  'Street Fighter','SF6','Tekken','Guilty Gear','Fatal Fury',
  'King of Fighters','KOF','Mortal Kombat','Under Night','Granblue Fantasy Versus',
  'Dragon Ball FighterZ','快打','鐵拳','格鬥'
];

// ══════════════════════════════
// STATE
// ══════════════════════════════
let allMatches   = [];
let allStreamers = [];
let allBanners   = [];
let twOnly = false;
let dataReady = false;

// ══════════════════════════════
// NAVIGATION
// ══════════════════════════════
const PAGE_TITLES = { home: '', streams: '實況列表', events: '賽事列表' };

window.navTo = function(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + page).classList.add('active');
  document.getElementById('hdr-title').textContent = PAGE_TITLES[page];
  window.scrollTo({ top: 0 });
};

// ══════════════════════════════
// HEADROOM
// ══════════════════════════════
let lastY = 0;
window.addEventListener('scroll', () => {
  const h = document.getElementById('hdr');
  const y = window.scrollY;
  h.classList.toggle('hide', y > lastY && y > 80);
  lastY = y;
}, { passive: true });

// ══════════════════════════════
// SHEET FETCH
// ══════════════════════════════
async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const r = await fetch(url);
  const t = await r.text();
  const json = JSON.parse(t.slice(47, -2));
  const cols = json.table.cols.map(c => c.label.trim());
  return (json.table.rows || []).map(row => {
    const obj = {};
    row.c.forEach((cell, i) => {
      if (!cols[i]) return;
      // raw value: use v for dates (Date(...)), f for formatted strings
      const val = cell ? (cell.v !== undefined ? cell.v : null) : null;
      const fmt = cell ? (cell.f !== undefined ? cell.f : null) : null;
      obj[cols[i]] = val;
      obj['_fmt_' + cols[i]] = fmt;
    });
    return obj;
  }).filter(r => Object.values(r).some(v => v !== null && v !== undefined));
}

// ══════════════════════════════
// DATE HELPERS
// ══════════════════════════════
function parseDate(v) {
  if (!v) return null;
  // gviz returns JS-style timestamp number for date cells
  if (typeof v === 'number') {
    // gviz numbers are ms since epoch in UTC
    return new Date(v);
  }
  const m = String(v).match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+)(?:,(\d+))?)?\)/);
  if (m) return new Date(+m[1], +m[2], +m[3], +(m[4]||0), +(m[5]||0), +(m[6]||0));
  const d = new Date(v);
  return isNaN(d) ? null : d;
}

function fmtDate(row, key) {
  // Prefer the formatted string Google provides
  const f = row['_fmt_' + key];
  if (f) return f;
  const d = parseDate(row[key]);
  if (!d) return '';
  return d.toLocaleString('zh-TW', {
    timeZone: 'Asia/Taipei',
    month: 'numeric', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function isOngoing(row) {
  if (String(row.is_active).toUpperCase() === 'FALSE') return false;
  const now = new Date();
  const s = parseDate(row.start_time);
  const e = parseDate(row.end_time);
  if (s && e) return now >= s && now <= e;
  return false;
}

function isUpcoming(row) {
  if (String(row.is_active).toUpperCase() === 'FALSE') return false;
  const now = new Date();
  const s = parseDate(row.start_time);
  const e = parseDate(row.end_time);
  if (e && e < now) return false;
  if (s) return s > now && s <= new Date(now.getTime() + 31*86400000);
  return false;
}

// ══════════════════════════════
// SVG ICONS
// ══════════════════════════════
const IC_CAL = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="1.5"/><line x1="5" y1="1.5" x2="5" y2="4.5"/><line x1="11" y1="1.5" x2="11" y2="4.5"/><line x1="2" y1="7" x2="14" y2="7"/></svg>`;
const IC_PIN = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6c0 3.5 4.5 8.5 4.5 8.5s4.5-5 4.5-8.5c0-2.5-2-4.5-4.5-4.5z"/><circle cx="8" cy="6" r="1.5"/></svg>`;
const IC_CHV = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,6 8,10 12,6"/></svg>`;

// ══════════════════════════════
// GAME TAGS
// ══════════════════════════════
function gameTags(str) {
  if (!str) return '';
  return str.split(',').map(g => {
    g = g.trim(); if (!g) return '';
    return `<span class="gtag ${GAME_CLASS[g]||'g-misc'}">${g}</span>`;
  }).join('');
}

// ══════════════════════════════
// MATCH CARD
// ══════════════════════════════
function buildMatchCard(row, live = false) {
  const el = document.createElement('div');
  el.className = 'match-card' + (live ? ' ongoing' : '');

  const sDate = fmtDate(row, 'start_time');
  const eDate = fmtDate(row, 'end_time');
  const dateStr = sDate ? (eDate && eDate !== sDate ? `${sDate} ～ ${eDate}` : sDate) : '';

  const chips = [
    live ? '<span class="chip chip-live">進行中</span>' : '',
    row.region_type ? `<span class="chip chip-region">${row.region_type}</span>` : '',
    (row.has_tw_players === true || String(row.has_tw_players).toUpperCase() === 'TRUE')
      ? '<span class="chip chip-tw">🇹🇼 台灣選手</span>' : '',
  ].filter(Boolean).join('');

  const meta = [
    dateStr ? `<span class="mm">${IC_CAL}${dateStr}（台灣時間）</span>` : '',
    row.location ? `<span class="mm">${IC_PIN}${row.location}</span>` : '',
  ].filter(Boolean).join('');

  const tags = row.game ? `<div class="game-tags">${gameTags(row.game)}</div>` : '';
  const sg   = row.startgg ? `<a class="sg-link" href="${row.startgg}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ Start.gg</a>` : '<span></span>';
  const exp  = row.description ? `<button class="expand-btn" onclick="toggleDetail(this,event)">詳細 ${IC_CHV}</button>` : '<span></span>';
  const det  = row.description ? `<div class="match-detail">${row.description}</div>` : '';

  el.innerHTML = `
    ${chips ? `<div class="match-chips">${chips}</div>` : ''}
    <div class="match-title">${row.title || '（未命名賽事）'}</div>
    ${meta ? `<div class="match-meta">${meta}</div>` : ''}
    ${tags}
    <div class="match-foot">${sg}${exp}</div>
    ${det}
  `;
  if (row.description) {
    el.addEventListener('click', () => {
      el.classList.toggle('expanded');
      el.querySelector('.expand-btn')?.classList.toggle('open');
    });
  }
  return el;
}

window.toggleDetail = function(btn, e) {
  e.stopPropagation();
  const c = btn.closest('.match-card');
  c.classList.toggle('expanded');
  btn.classList.toggle('open');
};

// ══════════════════════════════
// CAROUSEL
// ══════════════════════════════
const carouselTimers = {};

function buildCarousel(elId, items) {
  const el = document.getElementById(elId);
  if (!items.length) { el.innerHTML = '<div class="carousel-ph">目前沒有活動橫幅</div>'; return; }

  const slides = items.map((b,i) => `
    <a class="c-slide ${i===0?'on':''}" href="${b.target_link||'#'}" target="${b.target_link?'_blank':'_self'}" rel="noopener">
      ${b.image_url ? `<img src="${b.image_url}" alt="${b.title||''}">` : ''}
      <div class="c-overlay"></div>
      <div class="c-text">
        <div class="c-tag">活動</div>
        <div class="c-title">${b.title||''}</div>
      </div>
    </a>
  `).join('');
  const dots = items.length > 1
    ? `<div class="c-dots">${items.map((_,i)=>`<button class="c-dot ${i===0?'on':''}" onclick="goDot('${elId}',${i})" aria-label="${i+1}"></button>`).join('')}</div>`
    : '';
  el.innerHTML = slides + dots;

  if (items.length > 1) {
    let cur = 0;
    carouselTimers[elId] = setInterval(() => { cur=(cur+1)%items.length; goDot(elId,cur); }, 5000);
  }
}

window.goDot = function(elId, idx) {
  const el = document.getElementById(elId);
  el.querySelectorAll('.c-slide').forEach((s,i) => s.classList.toggle('on', i===idx));
  el.querySelectorAll('.c-dot').forEach((d,i) => d.classList.toggle('on', i===idx));
};

// ══════════════════════════════
// RENDER HOME
// ══════════════════════════════
function renderHome() {
  const ongoing  = allMatches.filter(isOngoing);
  const upcoming = allMatches.filter(isUpcoming)
    .sort((a,b) => (parseDate(a.start_time)||0)-(parseDate(b.start_time)||0));

  // Live section
  const liveSec = document.getElementById('home-live');
  if (ongoing.length && allStreamers.length) {
    liveSec.style.display = 'block';
    renderHomeStreams();
  } else {
    liveSec.style.display = 'none';
  }

  // Ongoing
  const ogEl = document.getElementById('home-ongoing');
  const ogSec = document.getElementById('home-ongoing-sec');
  ogEl.innerHTML = '';
  if (!ongoing.length) {
    ogSec.style.display = 'none';
  } else {
    ogSec.style.display = '';
    ongoing.forEach(r => ogEl.appendChild(buildMatchCard(r, true)));
  }

  // Upcoming (max 3 on home)
  const upEl = document.getElementById('home-upcoming');
  upEl.innerHTML = '';
  if (!upcoming.length) {
    upEl.innerHTML = '<div class="empty">近一個月暫無預定賽事</div>';
  } else {
    upcoming.slice(0,3).forEach(r => upEl.appendChild(buildMatchCard(r)));
  }
}

// ── HOME STREAM TABS ──
function renderHomeStreams() {
  const cowatch  = allStreamers.filter(s => s.stream_type==='觀賽直播'||s.stream_type==='共同視聽');
  const official = allStreamers.filter(s => s.stream_type==='賽事主台');
  fillHomeStreamPanel('home-cowatch', cowatch);
  fillHomeStreamPanel('home-official', official);
}

function fillHomeStreamPanel(panelId, list) {
  const el = document.getElementById(panelId);
  el.innerHTML = '';
  if (!list.length) { el.innerHTML = '<div class="empty">目前無直播資訊</div>'; return; }

  const featured = list[0];
  const rest = list.slice(1);
  const url0 = streamUrl(featured);

  // Featured big card
  const feat = document.createElement('a');
  feat.className = 'stream-feat' + (featured.is_live ? ' is-live' : '');
  feat.href = url0; feat.target = '_blank'; feat.rel = 'noopener';
  feat.innerHTML = `
    <div class="sf-thumb">
      ${featured.thumbnail_url
        ? `<img src="${featured.thumbnail_url}" alt="${featured.name}">`
        : `<div class="sf-thumb-ph">▶</div>`}
      ${featured.is_live ? '<span class="live-badge">LIVE</span>' : ''}
    </div>
    <div class="sf-info">
      <div class="sf-name">${featured.name||''}</div>
      <div class="sf-game">${featured.current_game||''}</div>
      ${featured.stream_title ? `<div class="sf-title">${featured.stream_title}</div>` : ''}
      <a class="sf-goto" href="${url0}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ 前往收看</a>
    </div>
  `;
  el.appendChild(feat);

  if (rest.length) {
    const grid = document.createElement('div');
    grid.className = 'stream-smalls';
    rest.forEach(s => {
      const su = streamUrl(s);
      const c = document.createElement('a');
      c.className = 'stream-small' + (s.is_live ? ' is-live' : '');
      c.href = su; c.target = '_blank'; c.rel = 'noopener';
      c.innerHTML = `
        <div class="ss-thumb">
          ${s.thumbnail_url ? `<img src="${s.thumbnail_url}" alt="${s.name}">` : `<div class="ss-thumb-ph">▶</div>`}
          ${s.is_live ? '<span class="live-badge">LIVE</span>' : ''}
        </div>
        <div class="ss-info">
          <div class="ss-name">${s.name||''}</div>
          <div class="ss-game">${s.current_game||''}</div>
        </div>
      `;
      grid.appendChild(c);
    });
    el.appendChild(grid);
  }
}

window.homeTab = function(tab) {
  document.querySelectorAll('.tab-bar .tab-btn[data-tab]').forEach(b =>
    b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('home-cowatch').style.display  = tab==='cowatch'  ? 'flex' : 'none';
  document.getElementById('home-official').style.display = tab==='official' ? 'flex' : 'none';
  document.getElementById('home-cowatch').style.flexDirection = 'column';
  document.getElementById('home-official').style.flexDirection = 'column';
};

// ══════════════════════════════
// RENDER STREAMS PAGE
// ══════════════════════════════
function renderStreamsPage() {
  const liveEl = document.getElementById('streams-live');
  const allEl  = document.getElementById('streams-all');

  // Sort: is_live=true 排前面，其餘按名字
  const sorted = [...allStreamers].sort((a,b) => {
    if (a.is_live && !b.is_live) return -1;
    if (!a.is_live && b.is_live) return 1;
    return (a.name||'').localeCompare(b.name||'', 'zh-TW');
  });

  const liveOnes = sorted.filter(s => s.is_live);
  const allOnes  = sorted;

  liveEl.innerHTML = '';
  if (!liveOnes.length) {
    liveEl.innerHTML = '<div class="empty">目前沒有正在直播格鬥遊戲的頻道</div>';
  } else {
    liveOnes.forEach(s => liveEl.appendChild(buildStreamCard(s)));
  }

  allEl.innerHTML = '';
  allOnes.forEach(s => allEl.appendChild(buildStreamCard(s)));
}

function buildStreamCard(s) {
  const url = streamUrl(s);
  const el = document.createElement('a');
  el.className = 'stream-card' + (s.is_live ? ' is-live' : '');
  el.href = url; el.target = '_blank'; el.rel = 'noopener';

  const pClass = s.platform==='YouTube' ? 'py' : 'pt';
  const pLabel = s.platform || 'Twitch';

  // 有頭貼用頭貼，有縮圖用縮圖，都沒有就 placeholder
  const thumbHtml = s.thumbnail_url
    ? `<img src="${s.thumbnail_url}" alt="${s.name||''}">`
    : s.avatar_url
    ? `<img class="s-avatar" src="${s.avatar_url}" alt="${s.name||''}">`
    : `<div class="s-thumb-ph">▶</div>`;

  el.innerHTML = `
    <div class="s-thumb">
      ${thumbHtml}
      ${s.is_live ? '<span class="live-badge">LIVE</span>' : ''}
    </div>
    <div class="s-info">
      <div class="s-name">${s.name||''}</div>
      ${s.is_live && s.current_game ? `<div class="s-game">${s.current_game}</div>` : ''}
      ${s.is_live && s.stream_title ? `<div class="s-stream-title">${s.stream_title}</div>` : ''}
      ${!s.is_live ? `<div class="s-game" style="color:var(--text-dim)">未直播</div>` : ''}
      <div class="s-platform ${pClass}">${pLabel}</div>
    </div>
  `;
  return el;
}

function streamUrl(s) {
  return s.platform==='YouTube'
    ? `https://youtube.com/@${s.channel_id||''}`
    : `https://twitch.tv/${s.channel_id||''}`;
}

// ══════════════════════════════
// RENDER EVENTS PAGE
// ══════════════════════════════
function renderEventsPage() {
  renderFocusList();
  renderCommunityList();
}

function renderFocusList() {
  const el = document.getElementById('focus-list');
  el.innerHTML = '';
  let rows = allMatches.filter(r => r.region_type === '焦點大賽');
  if (twOnly) rows = rows.filter(r => r.has_tw_players===true || String(r.has_tw_players).toUpperCase()==='TRUE');
  rows.sort((a,b) => {
    const sa = parseDate(a.start_time), sb = parseDate(b.start_time);
    return (sa||0)-(sb||0);
  });
  if (!rows.length) {
    el.innerHTML = twOnly
      ? '<div class="empty">目前沒有台灣選手參賽的焦點大賽</div>'
      : '<div class="empty">目前沒有焦點大賽資料</div>';
    return;
  }
  rows.forEach(r => el.appendChild(buildMatchCard(r, isOngoing(r))));
}

function renderCommunityList() {
  const el = document.getElementById('community-list');
  el.innerHTML = '';
  let rows = allMatches.filter(r => r.region_type === '社群＆聯賽');
  rows.sort((a,b) => (parseDate(a.start_time)||0)-(parseDate(b.start_time)||0));
  if (!rows.length) {
    el.innerHTML = '<div class="empty">目前沒有社群賽事資料</div>';
    return;
  }
  rows.forEach(r => el.appendChild(buildMatchCard(r, isOngoing(r))));
}

window.eventsTab = function(tab) {
  document.querySelectorAll('.tab-btn[data-etab]').forEach(b =>
    b.classList.toggle('active', b.dataset.etab===tab));
  document.getElementById('etab-focus').style.display     = tab==='focus'     ? '' : 'none';
  document.getElementById('etab-community').style.display = tab==='community' ? '' : 'none';
};

window.toggleTW = function() {
  twOnly = !twOnly;
  document.getElementById('tw-toggle').classList.toggle('on', twOnly);
  renderFocusList();
};

// ══════════════════════════════
// INIT
// ══════════════════════════════
async function init() {
  const [mRes, sRes, bRes] = await Promise.allSettled([
    fetchSheet('matches'),
    fetchSheet('streamers'),
    fetchSheet('banners'),
  ]);

  if (mRes.status==='fulfilled') allMatches   = mRes.value;
  if (sRes.status==='fulfilled') allStreamers = sRes.value;
  if (bRes.status==='fulfilled') allBanners   = bRes.value;

  // 首頁輪播：placement = 首頁 或空
  const homeBanners = allBanners
    .filter(b => !b.placement || b.placement==='首頁')
    .sort((a,b) => (+(a.sort_order)||99)-(+(b.sort_order)||99));
  buildCarousel('home-carousel', homeBanners);

  // 社群輪播：placement = 在地賽事 or 社群＆聯賽
  const communityBanners = allBanners
    .filter(b => b.placement==='在地賽事'||b.placement==='社群＆聯賽')
    .sort((a,b) => (+(a.sort_order)||99)-(+(b.sort_order)||99));
  buildCarousel('community-carousel', communityBanners);

  renderHome();
  renderStreamsPage();
  renderEventsPage();

  dataReady = true;
}

init();
