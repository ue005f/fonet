<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣格鬥遊戲</title>
<style>
:root {
  --bg:        #0d0d12;
  --bg-card:   #14141d;
  --bg-card2:  #1c1c28;
  --bg-tab:    #1c1c28;
  --accent:    #e8433a;
  --accent2:   #ff6b35;
  --live:      #22c55e;
  --text:      #eeecf0;
  --text-sub:  #8e8c9a;
  --text-dim:  #4e4c5c;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.14);
  --r:         12px;
  --r-sm:      8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
  line-height: 1.6;
  /* space for bottom nav */
  padding-bottom: 72px;
}

/* ─── HEADROOM HEADER ─── */
#hdr {
  position: sticky; top: 0; z-index: 200;
  background: rgba(13,13,18,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  transition: transform .28s ease;
}
#hdr.hide { transform: translateY(-100%); }

.hdr-inner {
  max-width: 680px; margin: 0 auto;
  padding: 0 18px; height: 54px;
  display: flex; align-items: center;
}

.logo {
  display: flex; align-items: center; gap: 9px;
  text-decoration: none; color: inherit;
}
.logo-mark {
  width: 32px; height: 32px; border-radius: 7px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: #fff;
}
.logo-name { font-size: 16px; font-weight: 700; letter-spacing: .02em; }
.logo-name em { font-style: normal; color: var(--accent); }

/* ─── BOTTOM NAV ─── */
#bnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: rgba(13,13,18,0.95);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-top: 1px solid var(--border);
  height: 60px;
  display: flex; align-items: center; justify-content: space-around;
}
.bnav-btn {
  flex: 1; height: 100%; border: none; background: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; color: var(--text-dim);
  transition: color .15s;
}
.bnav-btn.active { color: var(--accent); }
.bnav-btn svg { width: 22px; height: 22px; }

/* ─── SCROLL AREA ─── */
main {
  max-width: 680px; margin: 0 auto;
  padding: 20px 16px 20px;
  display: flex; flex-direction: column; gap: 32px;
}

/* ─── SECTION LABEL ─── */
.sec-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .1em;
  color: var(--text-sub);
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
.sec-label::before {
  content: ''; display: block; width: 3px; height: 13px;
  background: var(--accent); border-radius: 2px;
  flex-shrink: 0;
}
.sec-label.live-label::before { background: var(--live); }

.sec-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.more-btn {
  font-size: 11px; color: var(--text-dim); text-decoration: none;
  display: flex; align-items: center; gap: 3px;
  transition: color .15s;
}
.more-btn:hover { color: var(--text-sub); }

/* ─── LIVE SECTION ─── */
#live-section { display: none; }

/* Tab bar */
.tab-bar {
  display: flex; gap: 4px;
  background: var(--bg-card2); border-radius: var(--r-sm);
  padding: 3px; margin-bottom: 14px;
}
.tab-btn {
  flex: 1; padding: 7px 0; border: none; cursor: pointer;
  background: none; border-radius: 6px;
  font-size: 12px; font-weight: 600; color: var(--text-dim);
  transition: background .15s, color .15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.tab-btn.active {
  background: var(--bg-card);
  color: var(--text);
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--live); flex-shrink: 0;
  animation: blink 1.8s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

/* Stream cards */
.stream-grid { display: flex; flex-direction: column; gap: 10px; }

.stream-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  display: flex; text-decoration: none; color: inherit;
  transition: border-color .18s, transform .15s;
  cursor: pointer;
}
.stream-card:hover { border-color: var(--border-hi); transform: translateY(-1px); }

.stream-card.featured { flex-direction: column; }

/* featured = 上圖下文 */
.stream-thumb {
  position: relative; background: var(--bg-card2);
  overflow: hidden; flex-shrink: 0;
}
.stream-card.featured .stream-thumb {
  width: 100%; aspect-ratio: 16/9;
}
.stream-card:not(.featured) .stream-thumb {
  width: 120px; height: 68px;
}
.stream-thumb img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.thumb-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 24px;
}
.stream-card:not(.featured) .thumb-placeholder { font-size: 18px; }

.platform-pill {
  position: absolute; top: 8px; left: 8px;
  font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
}
.platform-twitch { background: #9146ff22; color: #bf94ff; border: 1px solid #9146ff44; }
.platform-youtube { background: #ff000022; color: #ff8080; border: 1px solid #ff000044; }

.stream-info {
  padding: 12px 14px; flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 3px;
}
.stream-card.featured .stream-info { padding: 14px 16px; }

.stream-name { font-size: 15px; font-weight: 600; }
.stream-card.featured .stream-name { font-size: 17px; }

.stream-game { font-size: 12px; color: var(--text-sub); }
.stream-title { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.goto-link {
  display: inline-flex; align-items: center; gap: 5px; margin-top: 10px;
  background: var(--accent); color: #fff;
  font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 6px;
  text-decoration: none; width: fit-content; transition: background .15s;
}
.goto-link:hover { background: var(--accent2); }

/* ─── BANNER CAROUSEL ─── */
.carousel-wrap {
  border-radius: var(--r); overflow: hidden;
  position: relative; aspect-ratio: 2/1;
  background: var(--bg-card2);
  cursor: pointer;
}
.carousel-wrap.tall { aspect-ratio: 16/7; }

.c-slide {
  position: absolute; inset: 0;
  opacity: 0; transition: opacity .55s ease;
  display: flex; align-items: flex-end;
  text-decoration: none; color: inherit;
}
.c-slide.on { opacity: 1; }

.c-slide img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
}
.c-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.15) 55%, transparent 100%);
}
.c-text {
  position: relative; z-index: 1;
  padding: 14px 16px; width: 100%;
}
.c-tag {
  display: inline-block; background: var(--accent); color: #fff;
  font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px; margin-bottom: 5px;
}
.c-title { font-size: 15px; font-weight: 700; line-height: 1.3; color: #fff; }

.c-dots {
  position: absolute; bottom: 10px; right: 12px; z-index: 2;
  display: flex; gap: 5px;
}
.c-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,.3); border: none; cursor: pointer;
  transition: background .2s, width .2s;
}
.c-dot.on { background: #fff; width: 14px; border-radius: 3px; }

.carousel-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 13px; gap: 8px;
}

/* ─── MATCH CARDS ─── */
.match-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
  position: relative; overflow: hidden;
  cursor: pointer;
  transition: border-color .18s, transform .15s;
}
.match-card::after {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent); border-radius: 3px 0 0 3px;
}
.match-card.ongoing::after { background: var(--live); }
.match-card:hover { border-color: var(--border-hi); transform: translateY(-1px); }

.match-card + .match-card { margin-top: 10px; }

.match-chips {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap;
}
.chip {
  font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px;
}
.chip-live  { background: rgba(34,197,94,.15); color: var(--live); }
.chip-region { background: rgba(255,255,255,.06); color: var(--text-sub); }

.match-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; line-height: 1.35; }

.match-meta {
  display: flex; flex-wrap: wrap; gap: 10px;
  font-size: 11px; color: var(--text-sub); margin-bottom: 10px;
}
.mm-item { display: flex; align-items: center; gap: 4px; }
.mm-item svg { width: 12px; height: 12px; opacity: .55; flex-shrink: 0; }

.game-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.gtag {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
}
.g-sf6  { background: rgba(232,67,58,.15);   color: #e8433a; }
.g-t8   { background: rgba(245,166,35,.15);  color: #f5a623; }
.g-gg   { background: rgba(100,149,237,.15); color: #6495ed; }
.g-ff   { background: rgba(34,197,94,.15);   color: #22c55e; }
.g-misc { background: rgba(255,255,255,.07); color: var(--text-sub); }

.match-foot {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}

.sg-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; color: var(--accent2);
  text-decoration: none; padding: 5px 10px;
  border: 1px solid rgba(255,107,53,.3); border-radius: 5px;
  transition: background .15s, border-color .15s;
}
.sg-link:hover { background: rgba(255,107,53,.1); border-color: rgba(255,107,53,.6); }

.expand-btn {
  background: none; border: none; cursor: pointer;
  font-size: 11px; color: var(--text-dim);
  display: flex; align-items: center; gap: 3px;
  padding: 4px 6px; border-radius: 4px;
  transition: color .15s, background .15s;
}
.expand-btn:hover { color: var(--text-sub); background: var(--bg-card2); }
.expand-btn svg { width: 13px; height: 13px; transition: transform .2s; }
.expand-btn.open svg { transform: rotate(180deg); }

.match-detail {
  display: none; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 13px; color: var(--text-sub); line-height: 1.75;
  white-space: pre-wrap;
}
.match-card.expanded .match-detail { display: block; }

/* ─── STATES ─── */
.empty { padding: 28px 0; text-align: center; font-size: 13px; color: var(--text-dim); }
.loading { display: flex; align-items: center; gap: 10px; padding: 24px 0; font-size: 13px; color: var(--text-dim); }
.spin {
  width: 15px; height: 15px; border-radius: 50%;
  border: 2px solid var(--border); border-top-color: var(--accent);
  animation: rot .7s linear infinite; flex-shrink: 0;
}
@keyframes rot { to { transform: rotate(360deg); } }

/* ─── RESPONSIVE ─── */
@media (max-width: 400px) {
  main { padding: 16px 12px 16px; gap: 24px; }
  .match-title { font-size: 15px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header id="hdr">
  <div class="hdr-inner">
    <a class="logo" href="#">
      <div class="logo-mark">拳</div>
      <div class="logo-name">台灣<em>格鬥</em></div>
    </a>
  </div>
</header>

<main>

  <!-- ① 觀賽直播（只在有進行中賽事時顯示） -->
  <section id="live-section">
    <div class="sec-row">
      <div class="sec-label live-label">觀賽直播</div>
    </div>

    <!-- 頁籤 -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="cowatch" onclick="switchTab('cowatch')">
        <span class="live-dot"></span>觀賽直播
      </button>
      <button class="tab-btn" data-tab="official" onclick="switchTab('official')">
        賽事主台
      </button>
    </div>

    <div id="cowatch-panel" class="stream-grid"></div>
    <div id="official-panel" class="stream-grid" style="display:none"></div>
  </section>

  <!-- ② 橫幅輪播 -->
  <section id="banner-section">
    <div class="carousel-wrap tall" id="carousel">
      <div class="carousel-placeholder">
        <div class="spin"></div>載入中…
      </div>
    </div>
  </section>

  <!-- ③ 現正進行中 -->
  <section id="ongoing-section">
    <div class="sec-label live-label">現正進行中</div>
    <div id="ongoing-list"><div class="loading"><div class="spin"></div>載入賽事…</div></div>
  </section>

  <!-- ④ 近期賽事 -->
  <section id="upcoming-section">
    <div class="sec-row">
      <div class="sec-label">近期賽事</div>
      <a class="more-btn" href="#">完整賽程 →</a>
    </div>
    <div id="upcoming-list"><div class="loading"><div class="spin"></div>載入賽事…</div></div>
  </section>

</main>

<!-- BOTTOM NAV -->
<nav id="bnav">
  <!-- 實況 -->
  <button class="bnav-btn" onclick="navTo('streams')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="2"/>
      <path d="M16.24 7.76a6 6 0 0 1 0 8.49"/>
      <path d="M7.76 7.76a6 6 0 0 0 0 8.49"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
    </svg>
  </button>
  <!-- 首頁 -->
  <button class="bnav-btn active" onclick="navTo('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
      <path d="M9 21V12h6v9"/>
    </svg>
  </button>
  <!-- 賽事 -->
  <button class="bnav-btn" onclick="navTo('events')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
  </button>
</nav>

<script>
// ── CONFIG ──────────────────────────────
const SHEET_ID = '1MBU9FQYsPqEwSgdAjmfxzOETK8vmBPY_JeNkP6vNgCw';

const GAME_CLASS = {
  'SF6':'g-sf6','Street Fighter 6':'g-sf6','快打旋風6':'g-sf6','快打6':'g-sf6',
  '鐵拳8':'g-t8','Tekken 8':'g-t8','T8':'g-t8',
  'GGST':'g-gg','Guilty Gear':'g-gg','Strive':'g-gg','罪惡裝備':'g-gg',
  'Fatal Fury':'g-ff','FATCOW':'g-ff','CotW':'g-ff','餓狼傳說':'g-ff',
};

// ── HEADROOM ────────────────────────────
let lastY = 0;
window.addEventListener('scroll', () => {
  const hdr = document.getElementById('hdr');
  const y = window.scrollY;
  hdr.classList.toggle('hide', y > lastY && y > 80);
  lastY = y;
}, { passive: true });

// ── SHEET FETCH ─────────────────────────
async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const r = await fetch(url);
  const t = await r.text();
  const json = JSON.parse(t.slice(47, -2));
  const cols = json.table.cols.map(c => c.label.trim());
  return (json.table.rows || []).map(row => {
    const obj = {};
    row.c.forEach((cell, i) => {
      if (!cols[i]) return;
      obj[cols[i]] = cell ? (cell.f !== undefined ? cell.f : cell.v) : null;
    });
    return obj;
  }).filter(r => Object.values(r).some(v => v !== null));
}

// ── DATE HELPERS ────────────────────────
function parseDate(v) {
  if (!v) return null;
  // Google Sheets gviz returns dates as "Date(YYYY,M,D,H,mm,ss)" — M is 0-indexed
  const m = String(v).match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
  if (m) {
    return new Date(+m[1], +m[2], +m[3], +(m[4]||0), +(m[5]||0), +(m[6]||0));
  }
  const d = new Date(v);
  return isNaN(d) ? null : d;
}

function fmtDate(v) {
  const d = parseDate(v);
  if (!d) return String(v || '');
  return d.toLocaleString('zh-TW', {
    timeZone: 'Asia/Taipei',
    month: 'numeric', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function isOngoing(row) {
  if (String(row.is_active).toUpperCase() === 'FALSE') return false;
  const now = new Date();
  const s = parseDate(row.start_time);
  const e = parseDate(row.end_time);
  if (s && e) return now >= s && now <= e;
  return false;
}

function isUpcoming(row) {
  if (String(row.is_active).toUpperCase() === 'FALSE') return false;
  const now = new Date();
  const horizon = new Date(now); horizon.setDate(now.getDate() + 31);
  const s = parseDate(row.start_time);
  const e = parseDate(row.end_time);
  if (e && e < now) return false;
  if (s) return s > now && s <= horizon;
  return false;
}

// ── GAME TAGS ───────────────────────────
function gameTags(str) {
  if (!str) return '';
  return str.split(',').map(g => {
    g = g.trim(); if (!g) return '';
    const cls = GAME_CLASS[g] || 'g-misc';
    return `<span class="gtag ${cls}">${g}</span>`;
  }).join('');
}

// ── MATCH CARD ──────────────────────────
const SVG_CAL = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="1.5"/><line x1="5" y1="1.5" x2="5" y2="4.5"/><line x1="11" y1="1.5" x2="11" y2="4.5"/><line x1="2" y1="7" x2="14" y2="7"/></svg>`;
const SVG_PIN = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6c0 3.5 4.5 8.5 4.5 8.5s4.5-5 4.5-8.5c0-2.5-2-4.5-4.5-4.5z"/><circle cx="8" cy="6" r="1.5"/></svg>`;
const SVG_CHV = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,6 8,10 12,6"/></svg>`;

function buildMatchCard(row, live = false) {
  const div = document.createElement('div');
  div.className = 'match-card' + (live ? ' ongoing' : '');

  const sDate = fmtDate(row.start_time);
  const eDate = fmtDate(row.end_time);
  const dateStr = sDate ? (eDate && eDate !== sDate ? `${sDate} ～ ${eDate}` : sDate) : '';

  const chips = [
    live ? '<span class="chip chip-live">進行中</span>' : '',
    row.region_type ? `<span class="chip chip-region">${row.region_type}</span>` : '',
  ].filter(Boolean).join('');

  const meta = [
    dateStr ? `<span class="mm-item">${SVG_CAL}${dateStr} (台灣時間)</span>` : '',
    row.location ? `<span class="mm-item">${SVG_PIN}${row.location}</span>` : '',
  ].filter(Boolean).join('');

  const tags = row.game ? `<div class="game-tags">${gameTags(row.game)}</div>` : '';

  const sgBtn = row.startgg
    ? `<a class="sg-link" href="${row.startgg}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ Start.gg</a>`
    : '<span></span>';

  const expBtn = row.description
    ? `<button class="expand-btn" onclick="toggleDetail(this,event)">詳細 ${SVG_CHV}</button>`
    : '<span></span>';

  const detail = row.description
    ? `<div class="match-detail">${row.description}</div>` : '';

  div.innerHTML = `
    ${chips ? `<div class="match-chips">${chips}</div>` : ''}
    <div class="match-title">${row.title || '（未命名賽事）'}</div>
    ${meta ? `<div class="match-meta">${meta}</div>` : ''}
    ${tags}
    <div class="match-foot">${sgBtn}${expBtn}</div>
    ${detail}
  `;

  if (row.description) {
    div.addEventListener('click', () => {
      div.classList.toggle('expanded');
      const btn = div.querySelector('.expand-btn');
      if (btn) btn.classList.toggle('open');
    });
  }
  return div;
}

window.toggleDetail = function(btn, e) {
  e.stopPropagation();
  const card = btn.closest('.match-card');
  card.classList.toggle('expanded');
  btn.classList.toggle('open');
};

// ── RENDER MATCHES ──────────────────────
function renderMatches(rows) {
  const ongoing  = rows.filter(isOngoing);
  const upcoming = rows.filter(isUpcoming)
    .sort((a,b) => (parseDate(a.start_time)||0) - (parseDate(b.start_time)||0));

  const ogEl = document.getElementById('ongoing-list');
  const upEl = document.getElementById('upcoming-list');

  ogEl.innerHTML = '';
  if (!ongoing.length) {
    ogEl.innerHTML = '<div class="empty">目前沒有進行中的賽事</div>';
    document.getElementById('ongoing-section').style.display = 'none';
  } else {
    ongoing.forEach(r => ogEl.appendChild(buildMatchCard(r, true)));
  }

  upEl.innerHTML = '';
  if (!upcoming.length) {
    upEl.innerHTML = '<div class="empty">近一個月暫無預定賽事</div>';
  } else {
    upcoming.forEach(r => upEl.appendChild(buildMatchCard(r, false)));
  }

  return { ongoing };
}

// ── RENDER STREAMS ──────────────────────
function renderStreams(streamers, hasOngoing) {
  if (!hasOngoing || !streamers.length) return;

  const sec = document.getElementById('live-section');
  sec.style.display = 'block';

  const cowatch  = streamers.filter(s => s.stream_type === '觀賽直播' || s.stream_type === '共同視聽');
  const official = streamers.filter(s => s.stream_type === '賽事主台');

  fillStreamPanel('cowatch-panel', cowatch);
  fillStreamPanel('official-panel', official);
}

function fillStreamPanel(panelId, list) {
  const el = document.getElementById(panelId);
  if (!list.length) {
    el.innerHTML = '<div class="empty">目前無直播資訊</div>';
    return;
  }
  list.forEach((s, i) => {
    const card = document.createElement('a');
    const url = s.platform === 'YouTube'
      ? `https://youtube.com/@${s.channel_id}`
      : `https://twitch.tv/${s.channel_id || ''}`;
    card.href = url; card.target = '_blank'; card.rel = 'noopener';
    card.className = 'stream-card' + (i === 0 ? ' featured' : '');

    const pClass = s.platform === 'YouTube' ? 'platform-youtube' : 'platform-twitch';
    const pLabel = s.platform || 'Twitch';

    const thumbHtml = s.thumbnail_url
      ? `<img src="${s.thumbnail_url}" alt="${s.name}" loading="lazy">`
      : `<div class="thumb-placeholder">▶</div>`;

    const gotoBtn = i === 0
      ? `<a class="goto-link" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ 前往收看</a>`
      : '';

    card.innerHTML = `
      <div class="stream-thumb">
        ${thumbHtml}
        <span class="platform-pill ${pClass}">${pLabel}</span>
      </div>
      <div class="stream-info">
        <div class="stream-name">${s.name || ''}</div>
        <div class="stream-game">${s.current_game || '載入中…'}</div>
        ${s.stream_title ? `<div class="stream-title">${s.stream_title}</div>` : ''}
        ${gotoBtn}
      </div>
    `;
    el.appendChild(card);
  });
}

window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('cowatch-panel').style.display  = tab === 'cowatch'  ? 'flex' : 'none';
  document.getElementById('official-panel').style.display = tab === 'official' ? 'flex' : 'none';
  document.getElementById('cowatch-panel').style.flexDirection  = 'column';
  document.getElementById('official-panel').style.flexDirection = 'column';
};

// ── RENDER BANNERS ──────────────────────
function renderBanners(banners) {
  const el = document.getElementById('carousel');
  const list = banners
    .filter(b => !b.placement || b.placement === '首頁')
    .sort((a,b) => (+(a.sort_order)||99) - (+(b.sort_order)||99));

  if (!list.length) {
    el.innerHTML = '<div class="carousel-placeholder">目前沒有活動橫幅</div>';
    return;
  }

  const slides = list.map((b, i) => `
    <a class="c-slide ${i===0?'on':''}" href="${b.target_link||'#'}" target="${b.target_link?'_blank':'_self'}" rel="noopener">
      ${b.image_url ? `<img src="${b.image_url}" alt="${b.title||''}">` : ''}
      <div class="c-overlay"></div>
      <div class="c-text">
        <div class="c-tag">活動</div>
        <div class="c-title">${b.title||''}</div>
      </div>
    </a>
  `).join('');

  const dots = list.map((_,i) =>
    `<button class="c-dot ${i===0?'on':''}" onclick="goDot(${i})" aria-label="橫幅${i+1}"></button>`
  ).join('');

  el.innerHTML = slides + (list.length > 1 ? `<div class="c-dots">${dots}</div>` : '');

  if (list.length > 1) {
    let cur = 0;
    setInterval(() => { cur = (cur+1) % list.length; goDot(cur); }, 5000);
  }
}

window.goDot = function(idx) {
  document.querySelectorAll('.c-slide').forEach((s,i) => s.classList.toggle('on', i===idx));
  document.querySelectorAll('.c-dot').forEach((d,i) => d.classList.toggle('on', i===idx));
};

// ── NAV (placeholder) ───────────────────
window.navTo = function(page) {
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  // 未來加入頁面切換邏輯
};

// ── INIT ────────────────────────────────
async function init() {
  const [mRes, sRes, bRes] = await Promise.allSettled([
    fetchSheet('matches'),
    fetchSheet('streamers'),
    fetchSheet('banners'),
  ]);

  // Banners
  if (bRes.status === 'fulfilled') renderBanners(bRes.value);
  else document.getElementById('carousel').innerHTML = '<div class="carousel-placeholder">無法載入橫幅</div>';

  // Matches
  let hasOngoing = false;
  if (mRes.status === 'fulfilled') {
    const { ongoing } = renderMatches(mRes.value);
    hasOngoing = ongoing.length > 0;
  } else {
    document.getElementById('ongoing-list').innerHTML  = '<div class="empty">無法載入賽事資料</div>';
    document.getElementById('upcoming-list').innerHTML = '';
  }

  // Streams（只在有進行中賽事時顯示）
  if (sRes.status === 'fulfilled') {
    renderStreams(sRes.value, hasOngoing);
  }
}

init();
</script>
</body>
</html>
