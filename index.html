
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TW FGC Hub - 台灣格鬥遊戲社群大廳</title>
<style>
/* --- 全域變數與熱血電競風暗黑樣式 --- /
:root {
--bg-main: #0b0c10;
--bg-card: #14161d;
--bg-border: #222531;
--text-main: #f1f5f9;
--text-muted: #64748b;
--color-primary: #ff6b00; / 經典快打格鬥橘 /
--color-secondary: #00f0ff; / 鐵拳/電競科技藍 */
--color-live: #ef4444;
--header-height: 90px;
}


* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

body {
background-color: var(--bg-main);
color: var(--text-main);
max-width: 500px; /* 手機極致優化載體 /
margin: 0 auto;
padding-top: var(--header-height);
padding-bottom: 70px; / 留空間給底部導覽列 */
overflow-x: hidden;
}

/* --- 聯動滾動頭部 (Scroll-linked Headroom Header) --- */
header {
position: fixed;
top: 0;
left: 0;
right: 0;
max-width: 500px;
margin: 0 auto;
height: var(--header-height);
background-color: rgba(11, 12, 16, 0.95);
backdrop-filter: blur(8px);
border-bottom: 1px solid var(--bg-border);
z-index: 100;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
transition: transform 0.3s ease-in-out;
}


header.header-hidden {
transform: translateY(-100%); /* 往下看內容時完全隱藏 */
}

header h1 {
font-size: 22px;
font-weight: 800;
letter-spacing: 1px;
background: linear-gradient(45deg, #fff, var(--color-primary));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}
header span {
font-size: 11px;
color: var(--text-muted);
margin-top: 2px;
}


/* 全域載入狀態 */
#loading-screen {
text-align: center;
padding: 50px 20px;
color: var(--color-secondary);
font-weight: bold;
font-size: 14px;
}

/* --- 頁面通用排版 --- */
.page-view {
display: none;
padding: 16px;
animation: fadeIn 0.3s ease;
}
.page-view.active {
display: block;
}
@keyframes fadeIn {

from { opacity: 0; transform: translateY(4px); }
to { opacity: 1; transform: translateY(0); }
}

h2 {
font-size: 16px;
margin: 24px 0 12px 0;
display: flex;
align-items: center;
gap: 6px;
border-left: 3px solid var(--color-primary);
padding-left: 8px;
}
h2:first-of-type { margin-top: 8px; }

/* --- 橫幅自動輪播 (Banner Slider) --- */
.slider-container {
position: relative;
width: 100%;
height: 160px;

border-radius: 12px;
overflow: hidden;
background-color: #1e293b;
margin-bottom: 16px;
}
.slider-wrapper {
display: flex;
width: 100%;
height: 100%;
transition: transform 0.5s ease-in-out;
}
.slide {
min-width: 100%;
height: 100%;
position: relative;
cursor: pointer;
}
.slide img {
width: 100%;
height: 100%;

object-fit: cover;
}
.slide .slide-title {
position: absolute;
bottom: 0; left: 0; right: 0;
background: linear-gradient(transparent, rgba(0,0,0,0.85));
padding: 12px;
font-size: 13px;
font-weight: bold;
}

/* --- 實況焦點與名冊樣式 (Streams) --- */
.spotlight-card {
background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
border: 1px solid var(--color-secondary);
border-radius: 12px;
overflow: hidden;
margin-bottom: 20px;

box-shadow: 0 4px 20px rgba(0, 240, 255, 0.1);
}
.spotlight-thumb {
width: 100%;
height: 180px;
background-color: #000;
position: relative;
overflow: hidden;
}
.spotlight-thumb img { width: 100%; height: 100%; object-fit: cover; }
.live-tag {
position: absolute;
top: 10px; left: 10px;
background-color: var(--color-live);
font-size: 10px;
font-weight: bold;
padding: 2px 6px;
border-radius: 4px;
animation: pulse 1.5s infinite;

}
.viewer-tag {
position: absolute;
top: 10px; right: 10px;
background-color: rgba(0,0,0,0.6);
font-size: 10px;
padding: 2px 6px;
border-radius: 4px;
}
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

.spotlight-info, .streamer-info {
padding: 12px;
display: flex;
align-items: center;
gap: 12px;
}
.avatar {
width: 40px; height: 40px;

border-radius: 50%;
background-color: #334155;
border: 2px solid var(--color-secondary);
object-fit: cover;
}
.stream-meta { flex: 1; }
.stream-title { font-size: 13px; color: #cbd5e1; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.streamer-card {
background-color: var(--bg-card);
border: 1px solid var(--bg-border);
border-radius: 12px;
margin-bottom: 8px;
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 12px;
}

.streamer-card.is-live { border-color: var(--color-live); }
.streamer-card .badge-live { background-color: var(--color-live); font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: bold; margin-left: 6px;}

/* --- 賽事卡片與雙模態設計 (Matches) --- */
.match-card {
background-color: var(--bg-card);
border: 1px solid var(--bg-border);
border-radius: 12px;
margin-bottom: 12px;
cursor: pointer;
overflow: hidden;
transition: border-color 0.2s;
}
.match-card:hover { border-color: var(--color-primary); }
.card-summary { padding: 14px; display: flex; 

justify-content: space-between; align-items: center; }
.summary-left { flex: 1; padding-right: 8px; }
.match-title { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.match-date-loc { font-size: 12px; color: var(--text-muted); display: flex; flex-direction: column; gap: 2px; }

.tags-container { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
.tag { font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 600; background-color: #334155; color: #cbd5e1; }
.tag-sf6 { background-color: #ff6b00; color: #fff; }
.tag-tekken8 { background-color: #00f0ff; color: #000; }
.tag-kof { background-color: #10b981; color: #fff; }
.tag-tw { background-color: #3b82f6; color: #fff; }


.btn-link {
background-color: #2a2d3d; color: #fff; text-decoration: none; font-size: 11px; font-weight: bold;
padding: 6px 10px; border-radius: 6px; border: 1px solid #3f445e; white-space: nowrap;
}
.btn-link:hover { background-color: var(--color-primary); }

/* 漸進式洩露展開抽屜 */
.card-details { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.2s ease-out; background-color: rgba(0,0,0,0.2); }
.match-card.open .card-details { grid-template-rows: 1fr; }
.details-inner { overflow: hidden; }
.details-content { padding: 14px; border-top: 1px solid var(--bg-border); font-size: 12px; color: 

#cbd5e1; line-height: 1.6; }

/* --- 頁籤與核心切換器 (Tabs & Controls) --- */
.tabs-header { display: flex; background-color: #161920; border-radius: 8px; padding: 4px; margin-bottom: 16px; }
.tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); padding: 8px; font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 6px; }
.tab-btn.active { background-color: var(--bg-card); color: #fff; border: 1px solid var(--bg-border); }

.filter-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; background-color: #14161d; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--bg-border); }
.filter-label { font-size: 12px; color: #cbd5e1; display: flex; align-items: center; gap: 6px; }


/* 現代感切換開關 (Switch CSS) */
.switch { position: relative; display: inline-block; width: 36px; height: 20px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .3s; border-radius: 20px; }
.slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
input:checked + .slider { background-color: var(--color-primary); }
input:checked + .slider:before { transform: translateX(16px); }

.live-section { background: linear-gradient(135deg, #221212 0%, #14161d 100%); border: 1px solid var(--color-live); border-radius: 

12px; padding: 4px 12px; margin-bottom: 20px; }
.past-card { opacity: 0.4; }

/* --- 底部固定導覽列 (Bottom Navigation) --- */
nav {
position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto;
height: 60px; background-color: #111318; border-top: 1px solid var(--bg-border);
display: flex; z-index: 100;
}
.nav-item {
flex: 1; background: none; border: none; color: var(--text-muted);
display: flex; flex-direction: column; justify-content: center; align-items: center;
gap: 4px; cursor: pointer; font-size: 11px; font-weight: bold;
}
.nav-item.active { color: var(--color-primary); }

.nav-icon { font-size: 18px; }
</style>
</head>
<body>

<header id="main-header">
<h1>🏆 TW FGC Hub</h1>
<span>台灣格鬥遊戲社群大廳</span>
</header>

<div id="loading-screen">大廳核心資料同步中，請稍候... ⚡</div>

<div id="app-content" style="display: none;">

<div id="page-home" class="page-view active">
<div id="home-stream-spotlight"></div>

<div class="slider-container">
<div id="home-slider-wrapper" class="slider-

wrapper"></div>
</div>

<div id="home-live-wrapper" style="display: none;">
<h2>🔴 現正開打 / 今日熱點</h2>
<div id="home-live-list" class="live-section"></div>
</div>

<h2>📅 近期精選賽事 (一個月內)</h2>
<div id="home-upcoming-list"></div>
</div>


<div id="page-streams" class="page-view">
<h2>🔴 線上即時轉播 / 共聽台</h2>
<div id="live-streamers-list"></div>

<h2>日常推薦名單 & 休息中</h2>

<div id="offline-streamers-list"></div>
</div>


<div id="page-matches" class="page-view">
<div class="tabs-header">
<button class="tab-btn active" onclick="switchMatchTab('major')">焦點大賽</button>
<button class="tab-btn" onclick="switchMatchTab('regular')">社群＆聯賽</button>
</div>

<div id="major-filter-bar" class="filter-bar">
<div class="filter-label">🇹🇼 只看有台灣選手參賽的項目</div>
<label class="switch">
<input type="checkbox" id="tw-player-switch" onchange="renderMatchesPage()">

<span class="slider"></span>
</label>

<div id="regular-banner-container" class="slider-container" style="display: none;">
<div id="regular-slider-wrapper" class="slider-wrapper"></div>
</div>

<div id="matches-list-container"></div>
</div>

</div>

<nav>
<button class="nav-item active" data-page="page-home" onclick="switchPage('page-home')">
<span class="nav-icon">🏠</span><span>首頁</

span>
</button>
<button class="nav-item" data-page="page-streams" onclick="switchPage('page-streams')">
<span class="nav-icon">📺</span><span>實況列表</span>
</button>
<button class="nav-item" data-page="page-matches" onclick="switchPage('page-matches')">
<span class="nav-icon">📅</span><span>賽事列表</span>
</button>
</nav>

<script>
// --- 1. 基礎設定與試算表 ID 連接 ---
const SHEET_ID = "1MBU9FQYsPqEwSgdAjmfxzOETK8vmBPY_JeNkP6vNgCw";

let dbMatches = [];
let dbStreamers = [];
let dbBanners = [];
let currentMatchTab = 'major'; // 'major' = 焦點大賽, 'regular' = 社群＆聯賽

// --- 2. 聯動滾動隱藏 Header 邏輯 ---
let lastScrollY = window.scrollY;
const mainHeader = document.getElementById('main-header');
window.addEventListener('scroll', () => {
if (window.scrollY > lastScrollY && window.scrollY > 80) {
mainHeader.classList.add('header-hidden');
} else {
mainHeader.classList.remove('header-hidden');
}
lastScrollY = window.scrollY;
});

// --- 3. SPA 頁面切換控制 ---
function switchPage(pageId) {
document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
document.getElementById(pageId).classList.add('active');

document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
document.querySelector(`[data-page="${pageId}"]`).classList.add('active');

// 切換頁面時自動把 Header 降下來
mainHeader.classList.remove('header-hidden');
window.scrollTo(0, 0);
}

function switchMatchTab(tabType) {
currentMatchTab = tabType;
document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
if(tabType === 'major') {
document.querySelectorAll('.tab-btn')[0].classList.add('active');
document.getElementById('major-filter-bar').style.display = 'flex';
document.getElementById('regular-banner-container').style.display = 'none';
} else {
document.querySelectorAll('.tab-btn')[1].classList.add('active');
document.getElementById('major-filter-bar').style.display = 'none';
document.getElementById('regular-banner-container').style.display = 'block';
setupCarousel('regular-slider-wrapper', '在地賽事');
}
renderMatchesPage();
}


// --- 4. 初始化讀取三大分頁網路資料 ---
window.addEventListener('DOMContentLoaded', () => {
const fetchMatches = fetchTabJSON('matches');
const fetchStreamers = fetchTabJSON('streamers');
const fetchBanners = fetchTabJSON('banners');

Promise.all([fetchMatches, fetchStreamers, fetchBanners])
.then(([matchesData, streamersData, bannersData]) => {
dbMatches = parseRows(matchesData, 'matches');
dbStreamers = parseRows(streamersData, 'streamers');
dbBanners = parseRows(bannersData, 'banners');

// 隱藏載入提示，打開主要大廳

document.getElementById('loading-screen').style.display = 'none';
document.getElementById('app-content').style.display = 'block';

// 執行三大核心渲染
simulateLiveStreamers(); // 執行智慧實況過濾與權重排序
renderHomePage();
renderStreamersPage();
renderMatchesPage();
})
.catch(err => {
console.error("初始化大廳資料失敗:", err);
document.getElementById('loading-screen').innerHTML = "❌ 串接失敗，請檢查 Sheet 是否有發布到網路，且頁籤名稱正確。";
});
});

function fetchTabJSON(tabName) {
const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
return fetch(url).then(res => res.text());
}

function parseRows(rawText, type) {
try {
const jsonString = rawText.match(/google.visualization.Query.setResponse(([\s\S\w]+))/)[1];
const json = JSON.parse(jsonString);
return json.table.rows.map(row => {
const getV = (i) => {
if (!row.c || !row.c[i]) return "";
return row.c[i].f ? row.c[i].f : row.c[i].v;
};
if (type === 'matches') {

return {
title: getV(0), game: getV(1), start_time: getV(2), end_time: getV(3),
link: getV(4), is_active: getV(5) !== "" ? String(getV(5)).toUpperCase() : "TRUE",
description: String(getV(6)).replace(/\n/g, '<br>'),
region_type: getV(7), has_tw_players: String(getV(8)).toUpperCase() === "TRUE",
location: getV(9)
};
} else if (type === 'streamers') {
return { name: getV(0), platform: getV(1), channel_id: getV(2), stream_type: getV(3) };
} else if (type === 'banners') {
return { title: getV(0), placement: getV(1), image_url: getV(2), target_link: getV(3), sort_order: Number(getV(4)) || 99 };
}
});
} catch(e) { return []; }

}

// --- 5. 智慧實況自動捕獲與防轟炸模擬機制 ---
// 實務上這段會去呼叫 Twitch API 取得真實 live 狀態、遊戲分類與人數。
// 此處實作自動化資料組裝，無痛模擬真實 API 吐回的結果。
function simulateLiveStreamers() {
dbStreamers.forEach(s => {
// 智慧模擬：隨機讓名單上某些人在播快打旋風 6 或是進行共同視聽
s.isLive = Math.random() > 0.4;
s.viewers = s.isLive ? Math.floor(Math.random() * 2500) + 50 : 0;
s.gameName = s.isLive ? "Street Fighter 6" : "Offline";
s.streamTitle = s.isLive ? 【🔥連動】線上同步共聽應援中！台港澳大對決！ : "休息中";
s.avatarUrl = https://api.dicebear.com/7.x/bottts/svg?seed=$

{encodeURIComponent(s.name)}; s.previewUrl =https://picsum.photos/seed/${encodeURIComponent(s.name)}/400/225;
});
// 權重排序：正在 Live 的放到最上方，並依照觀看人數由高到低排序
dbStreamers.sort((a,b) => (b.isLive ? b.viewers : 0) - (a.isLive ? a.viewers : 0));
}

// --- 6. 核心時間排序與判定輔助函式 ---
function getMatchStatus(match) {
const now = new Date();

// 處理「每週自動輪迴機制」
if(String(match.start_time).includes("每週")) {
const dayMap = {"日":0, "一":1, "二":2, "三":3, "四":4, "五":5, "六":6};
const targetDayChar = match.start_time.match(/每週(.)/);

if(targetDayChar && dayMap[targetDayChar[1]] !== undefined) {
const targetDay = dayMap[targetDayChar[1]];
const todayDay = now.getDay();
if(todayDay === targetDay) {
return { isLive: true, isPast: false, isUpcoming: false, dateStr: ``${match.start_time} (今晚開打)` };
}
}
return { isLive: false, isPast: false, isUpcoming: true, dateStr: match.start_time };
}

const start = new Date(match.start_time);
let end = new Date(match.end_time);
if (isNaN(end.getTime())) end = new Date(start.getTime() + 4 * 60 * 60 * 1000); // 沒填結束時間預設 4 小時

const dateStr = 📅 ${match.start_time} $

{match.end_time ? '~ ' + match.end_time : ''};

if (match.is_active === "FALSE") return { isLive: false, isPast: true, isUpcoming: false, dateStr };
if (now >= start && now <= end) return { isLive: true, isPast: false, isUpcoming: false, dateStr };
if (end < now) return { isLive: false, isPast: true, isUpcoming: false, dateStr };
return { isLive: false, isPast: false, isUpcoming: true, dateStr };
}

// --- 7. 畫面渲染：首頁 (Home View) ---
function renderHomePage() {
// A. 抓取目前人數最高的共聽台/官方台做成頂部大卡片
const topLive = dbStreamers.find(s => s.isLive && (s.stream_type === '賽事主台' || s.stream_type === '共同視聽'));
const spotlightContainer = 

document.getElementById('home-stream-spotlight');

if (topLive) {
spotlightContainer.style.display = 'block';
spotlightContainer.innerHTML = &lt;h2&gt;🔥 熱門轉播與共同視聽&lt;/h2&gt; &lt;div class="spotlight-card" onclick="window.open('https://twitch.tv/${topLive.channel_id}', '_blank')">
<div class="spotlight-thumb">
<span class="live-tag">🔴 LIVE</span>
<span class="viewer-tag">👥 ${topLive.viewers} 人正在看&lt;/span&gt; &lt;img src="${topLive.previewUrl}" alt="Stream Preview">
</div>
<div class="spotlight-info">
<img class="avatar" src="${topLive.avatarUrl}" alt="Avatar"&gt; &lt;div class="stream-meta"&gt; &lt;div style="font-weight:bold; font-

size:14px;"&gt;${topLive.name} <span style="color:#ff6b00; font-size:11px;">[${topLive.stream_type}]&lt;/span&gt;&lt;/div&gt; &lt;div class="stream-title"&gt;${topLive.streamTitle}</div>
</div>
</div>
</div>
`;
} else {
spotlightContainer.style.display = 'none';
}

// B. 載入首頁自動輪播橫幅
setupCarousel('home-slider-wrapper', '首頁');

// C. 載入賽事分流（現正進行中、精選一個月內賽事）
let liveHtml = "";
let upcomingHtml = "";

const now = new Date();
const oneMonthLater = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);

// 依時間排序
const sortedMatches = [...dbMatches].sort((a,b) => new Date(a.start_time) - new Date(b.start_time));

sortedMatches.forEach(m => {
if(!m.title || m.title.trim() === "") return;
const status = getMatchStatus(m);
const cardHtml = createMatchCard(m, status);

if (status.isLive) {
liveHtml += cardHtml;
} else if (status.isUpcoming) {
const matchStart = new Date(m.start_time);
// 限制精選賽事在 30 天之內
if (isNaN(matchStart.getTime()) || matchStart <= 

oneMonthLater) {
upcomingHtml += cardHtml;
}
}
});

if (liveHtml !== "") {
document.getElementById('home-live-wrapper').style.display = "block";
document.getElementById('home-live-list').innerHTML = liveHtml;
} else {
document.getElementById('home-live-wrapper').style.display = "none";
}
document.getElementById('home-upcoming-list').innerHTML = upcomingHtml || "<p style='color:var(--text-muted); font-size:12px;'>近期30天內暫無登錄賽事。</p>";
}


// --- 8. 畫面渲染：實況列表頁 (Streams View) ---
function renderStreamersPage() {
let liveHtml = "";
let offlineHtml = "";

dbStreamers.forEach(s => {
const url = s.platform.toLowerCase() === 'twitch' ? https://twitch.tv/${s.channel_id}: s.target_link; if (s.isLive) { liveHtml +=
<div class="streamer-card is-live" onclick="window.open('

{s.avatarUrl}">

// --- 9. 畫面渲染：賽事列表頁 (Matches View) ---
function renderMatchesPage() {
const container = document.getElementById('matches-list-container');
const showOnlyTw = document.getElementById('tw-player-switch').checked;

let htmlResult = "";

// 複製一份並排序
const sortedMatches = [...dbMatches].sort((a,b) => new Date(a.start_time) - new Date(b.start_time));

// 分流過濾
sortedMatches.forEach(m => {

if(!m.title || m.title.trim() === "") return;

// 檢查主要頁籤分類
if (currentMatchTab === 'major' && m.region_type !== '焦點大賽') return;
if (currentMatchTab === 'regular' && m.region_type !== '社群＆聯賽') return;

// 檢查只看台灣選手開關
if (currentMatchTab === 'major' && showOnlyTw && !m.has_tw_players) return;

const status = getMatchStatus(m);
let cardHtml = createMatchCard(m, status);

if (status.isPast) {
cardHtml = cardHtml.replace("match-card", "match-card past-card");
}
htmlResult += cardHtml;

});

container.innerHTML = htmlResult || "<p style='color:var(--text-muted); font-size:12px; text-align:center; padding:30px;'>沒有符合此分類的賽事資料。</p>";
}

// --- 10. 輔助功能：動態製造賽事卡片 HTML ---
function createMatchCard(match, status) {
let tagsHtml = "";

// 智慧對對碰：自動為格鬥遊戲打上特色標籤
if (match.game) {
match.game.split(',').forEach(g => {
let cClass = "";
const ug = g.toUpperCase();
if (ug.includes("SF6") || ug.includes("快打")) cClass = "tag-sf6";
else if (ug.includes("鐵拳") || 

ug.includes("TEKKEN")) cClass = "tag-tekken8";
else if (ug.includes("KOF") || ug.includes("拳皇")) cClass = "tag-kof";
tagsHtml += <span class="tag${cClass}">${g.trim()}&lt;/span>;
});
}
if (match.has_tw_players) {
tagsHtml += <span class="tag tag-tw"&gt;🇹🇼 台灣選手參戰&lt;/span>;
}

const linkBtn = match.link && match.link.trim() !== ""
? <a href="${match.link.trim().startsWith("http") ? match.link.trim() : "https://" + match.link.trim()}" target="_blank" class="btn-link" onclick="event.stopPropagation();">🏆 賽事連結</a>:<span style="color:var(--text-muted); font-size:11px; font-weight:bold;">未公布</span>`;


const desc = match.description && match.description.trim() !== "" ? match.description : "點擊此處展開查看詳細賽程與社群公告。";
const locStr = match.location ? 📍 地點: ${match.location}` : "📍 地點: 網路線上賽";

return &lt;div class="match-card" onclick="toggleCard(this)"&gt; &lt;div class="card-summary"&gt; &lt;div class="summary-left"&gt; &lt;div class="match-title"&gt;${match.title}</div>
<div class="match-date-loc">
<div>

{locStr}</div>
</div>
<div class="tags-container">


{linkBtn}</div>
</div>
<div class="card-details">
<div class="details-inner">
<div class="details-content">${desc}&lt;/div&gt; &lt;/div&gt; &lt;/div&gt; &lt;/div&gt;;
}

function toggleCard(el) {
el.classList.toggle('open');
}

// --- 11. 輔助功能：全自動輪播橫幅邏輯 ---
function setupCarousel(wrapperId, placementFilter) {
const wrapper = document.getElementById(wrapperId);
const filteredBanners = dbBanners
.filter(b => b.placement === placementFilter)
.sort((a,b) => a.sort_order - b.sort_order);


if(filteredBanners.length === 0) {
wrapper.parentElement.style.display = 'none';
return;
}
wrapper.parentElement.style.display = 'block';

let slidesHtml = "";
filteredBanners.forEach(b => {
slidesHtml += &lt;div class="slide" onclick="if('${b.target_link}') window.open('

{b.image_url}" alt="

{b.title}</div>
</div>
`;

});
wrapper.innerHTML = slidesHtml;

// 啟動定時器進行無縫輪播
let currentIndex = 0;
if(wrapper.dataset.intervalId) clearInterval(wrapper.dataset.intervalId);

const intervalId = setInterval(() => {
currentIndex = (currentIndex + 1) % filteredBanners.length;
wrapper.style.transform = translateX(-${currentIndex * 100}%);
}, 4000);

wrapper.dataset.intervalId = intervalId;
}
</script>
