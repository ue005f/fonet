<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>623Hub — FGC 原型</title>
<style>
  :root {
    --bg: #0B1020;
    --bg2: #131829;
    --card: #1C2236;
    --card2: #222840;
    --accent: #A855F7;
    --accent-dim: rgba(168,85,247,0.12);
    --accent-dim2: rgba(168,85,247,0.06);
    --text: #FFFFFF;
    --text2: #A0A8C0;
    --text3: #666A7A;
    --live-red: #FF4444;
    --radius: 10px;
    --radius-sm: 6px;
    --header-h: 56px;
    --nav-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  /* ── Page switcher (hidden) ── */
  .switcher { display: none; }

  /* ── Phone shell ── */
  .phone {
    width: 390px;
    height: 100vh;
    background: var(--bg);
    position: relative;
    margin-top: 0;
    overflow: hidden;
  }

  /* ── Pages ── */
  .page {
    display: none;
    flex-direction: column;
    height: 100vh;
    padding-bottom: var(--nav-h);
    position: relative;
  }
  .page.active { display: flex; }

  /* ── Header ── */
  header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    background: var(--bg);
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: transform 0.28s ease, opacity 0.28s ease;
  }
  header.hidden {
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  .icon-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: var(--card);
    color: var(--text2);
    border: none;
    cursor: pointer;
    font-size: 16px;
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    width: 390px;
    height: var(--nav-h);
    background: var(--bg2);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 8px 0;
    color: var(--text3);
    font-size: 11px;
    transition: color 0.15s;
    border: none;
    background: none;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 22px; height: 22px; }

  /* ── Scrollable content ── */
  .content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-top: var(--header-h); margin-top: 0; }

  /* ── Section header ── */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 20px 18px 10px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 18px 10px;
  }
  .section-header h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .more-link {
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
  }

  /* ── Tags ── */
  .tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .tag-live {
    background: rgba(255,68,68,0.15);
    color: var(--live-red);
    border: 1px solid rgba(255,68,68,0.3);
  }
  .tag-tw {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(25,247,226,0.25);
  }
  .tag-game {
    background: var(--card2);
    color: var(--text2);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .tag-weekly {
    background: rgba(255,255,255,0.06);
    color: var(--text2);
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* ── Event card ── */
  .event-card {
    margin: 0 18px 8px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.04);
    position: relative;
  }
  .event-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .event-card-left { flex: 1; min-width: 0; }
  .event-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
  .event-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    line-height: 1.25;
  }
  .event-date {
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
  }
  .event-desc {
    font-size: 12px;
    color: var(--text3);
    margin-top: 6px;
  }
  .btn-schedule {
    padding: 7px 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }
  /* detail-link moved to expand section */

  /* ── Live card (list style) ── */
  .live-card {
    margin: 0 18px 8px;
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    overflow: hidden;
    gap: 0;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .live-card:hover { border-color: rgba(25,247,226,0.2); }
  .live-thumb {
    width: 110px;
    height: 72px;
    background: var(--card2);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .live-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .live-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a2240, #2a3460);
  }
  .live-dot {
    position: absolute;
    top: 6px; left: 6px;
    background: var(--live-red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }
  .live-info {
    flex: 1;
    padding: 10px 14px;
    min-width: 0;
  }
  .live-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .live-title {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.8;
  }
  .live-game {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }
  .live-platform {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 5px;
    font-size: 11px;
    color: var(--text3);
  }
  .live-avatar {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--card2);
    overflow: hidden;
    flex-shrink: 0;
  }
  .live-avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    justify-content: center;
    padding: 0 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 4px;
  }
  .tab {
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* ── Game filter chips ── */
  .filter-chips {
    display: flex;
    gap: 8px;
    padding: 12px 18px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-chips::-webkit-scrollbar { display: none; }
  .chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── HOMEPAGE ── */

  /* Hero */
  .hero {
    position: relative;
    margin: 12px 18px 0;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--card);
  }
  .hero-img {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #1a2240 0%, #0d1830 50%, #1a2840 100%);
    position: relative;
    display: flex;
    align-items: flex-end;
  }
  .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(11,16,32,0.95) 0%, rgba(11,16,32,0.3) 50%, transparent 100%);
  }
  .hero-content {
    position: relative;
    padding: 14px 16px;
    width: 100%;
  }
  .hero-event-name {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1.2;
  }
  .hero-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hero-live-badge {
    background: var(--live-red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.08em;
  }
  .hero-cta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  .btn-primary {
    padding: 8px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .btn-ghost {
    padding: 8px 14px;
    background: transparent;
    color: var(--text2);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }

  /* Hero placeholder art */
  .hero-art {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.18;
    font-size: 72px;
    letter-spacing: -4px;
    font-weight: 900;
    color: var(--accent);
    user-select: none;
  }

  /* Horizontal live scroll */
  .live-scroll {
    display: flex;
    gap: 10px;
    padding: 0 18px 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .live-scroll::-webkit-scrollbar { display: none; }
  .live-scroll-card {
    flex-shrink: 0;
    width: 130px;
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .live-scroll-card:hover { border-color: rgba(25,247,226,0.2); }
  .live-scroll-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #1a2240, #2a3460);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: rgba(255,255,255,0.15);
  }
  .live-scroll-info {
    padding: 8px 10px;
  }
  .live-scroll-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .live-scroll-game {
    font-size: 10px;
    color: var(--text2);
    margin-top: 2px;
  }

  /* Banner */
  .banner {
    margin: 24px 18px 8px;
    border-radius: var(--radius);
    overflow: hidden;
    background: linear-gradient(135deg, #1C2236, #252d45);
    border: 1px solid rgba(25,247,226,0.1);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .banner-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
  }
  .banner-text strong { color: var(--text); display: block; font-size: 14px; margin-bottom: 2px; }
  .banner-btn {
    padding: 7px 14px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Banner carousel ── */
  .banner-carousel {
    margin: 24px 18px 8px;
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }
  .banner-slide {
    display: none;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    text-decoration: none;
  }
  .banner-slide.active { display: block; }
  /* 有圖片的 banner */
  .banner-slide-img {
    width: 100%;
    aspect-ratio: 3/1;
    object-fit: cover;
    display: block;
  }
  /* 無圖片的 banner（文字版）*/
  .banner-slide-text {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 18px;
    background: linear-gradient(135deg, #1C1A2E, #252040);
    border: 1px solid rgba(168,85,247,0.1);
    border-radius: var(--radius);
  }
  .banner-slide-body {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
  }
  .banner-slide-body strong {
    color: var(--text);
    display: block;
    font-size: 14px;
    margin-bottom: 2px;
  }
  /* 分頁點點 */
  .banner-dots {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-top: 8px;
  }
  .banner-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.2s, width 0.2s;
    cursor: pointer;
  }
  .banner-dot.active {
    background: var(--accent);
    width: 14px;
    border-radius: 3px;
  }

  /* divider */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.04);
    margin: 4px 0;
  }

  /* ── EVENTS PAGE ── */
  .section-sub-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.06em;
    padding: 18px 18px 8px;
    text-transform: uppercase;
  }
  .month-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.05em;
    padding: 16px 18px 8px;
    text-transform: uppercase;
  }

  /* toggle row */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 18px 0;
  }
  .toggle-label {
    font-size: 12px;
    color: var(--text2);
  }
  .toggle {
    width: 36px; height: 20px;
    background: var(--card2);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08);
    transition: background 0.2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(16px); }

  /* ── OFFLINE divider in live page ── */
  .offline-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px 10px;
  }
  .offline-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .offline-line {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  /* ── Offline toggle button ── */
  .offline-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    cursor: pointer;
    color: var(--text3);
    font-size: 12px;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    transition: color 0.15s;
  }
  .offline-toggle:hover { color: var(--text2); }
  .offline-toggle-line {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }
  .offline-toggle-label {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 11px;
  }
  .offline-arrow {
    display: inline-block;
    transition: transform 0.25s ease;
    font-style: normal;
    font-size: 10px;
  }
  .offline-toggle.open .offline-arrow { transform: rotate(90deg); }

  /* ── Offline list ── */
  .offline-list {
    display: none;
  }
  .offline-list.open { display: block; }

  /* page title area */
  .page-title-area {
    padding: 16px 18px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .page-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .page-title span { color: var(--accent); }

  /* LIVE LIVE big header */
  .live-header {
    padding: 16px 18px 0;
  }
  .live-title {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .live-title-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--live-red);
    box-shadow: 0 0 8px var(--live-red);
    animation: pulse 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* empty space at bottom of offline */
  .spacer { height: 20px; }

  /* ── Loading placeholder ── */
  .loading-placeholder {
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    padding: 32px 18px;
  }
  .error-placeholder {
    text-align: center;
    color: var(--live-red);
    font-size: 12px;
    padding: 20px 18px;
    opacity: 0.7;
  }

  /* ── Three-dot menu ── */
  .menu-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    align-items: flex-start;
    justify-content: flex-end;
  }
  .menu-overlay.open { display: flex; }
  .menu-panel {
    margin: 52px 12px 0 0;
    background: #1C1A2E;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    min-width: 200px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .menu-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .menu-site-name {
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .menu-site-name span { color: var(--accent); }
  .menu-site-desc {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    line-height: 1.5;
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 16px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s, color 0.15s;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .menu-item-icon { font-size: 16px; width: 20px; text-align: center; }

<script>
function shuffleLiveCards() {
  const liveSection = document.querySelector('#page-live .content');
  if (!liveSection) return;
  // Get all online live cards (not in offline-list)
  const onlineCards = Array.from(liveSection.querySelectorAll('.live-card:not(.offline-list .live-card)'));
  if (onlineCards.length < 2) return;
  // Find insertion point (before offline section)
  const offlineSection = document.getElementById('offline-section');
  // Shuffle
  for (let i = onlineCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [onlineCards[i], onlineCards[j]] = [onlineCards[j], onlineCards[i]];
  }
  // Re-insert in shuffled order
  onlineCards.forEach(card => {
    liveSection.insertBefore(card, offlineSection);
  });
}

function toggleAbout(btn) {
  const about = document.getElementById('menu-about');
  about.classList.toggle('open');
}

function openMenu() {
  document.getElementById('menu-overlay').classList.add('open');
}

function closeMenu(e) {
  document.getElementById('menu-overlay').classList.remove('open');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + id);
  target.classList.add('active');
  const content = target.querySelector('.content');
  if (content) content.scrollTop = 0;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-item[data-page="' + id + '"]').forEach(b => b.classList.add('active'));
  // 更新網址 hash，讓重新整理能回到同一頁
  history.replaceState(null, '', '#' + id);
}

// 讀取 hash 決定初始頁面
function initPageFromHash() {
  const hash = window.location.hash.replace('#', '');
  const validPages = ['home', 'live', 'events'];
  const page = validPages.includes(hash) ? hash : 'home';
  showPage(page);
}

function filterChip(chipEl, game) {
  // Update chip styles
  chipEl.closest('.filter-chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');
  // Show/hide offline section — only visible on 全部
  const offlineSection = document.getElementById('offline-section');
  if (offlineSection) {
    offlineSection.style.display = (game === 'all') ? '' : 'none';
  }
  // Filter live cards (exclude offline-list cards when not 全部)
  const cards = document.querySelectorAll('#page-live .live-card');
  cards.forEach(card => {
    const g = card.dataset.game || 'other';
    const mainGames = ['sf6','kof','cotw','ggst','gbvsr','tk8'];
    if (game === 'all') {
      // Only show online cards here; offline list handles its own
      if (!card.closest('.offline-list')) card.style.display = '';
    } else if (game === 'other') {
      if (!card.closest('.offline-list')) {
        card.style.display = mainGames.includes(g) ? 'none' : '';
      }
    } else {
      if (!card.closest('.offline-list')) {
        card.style.display = (g === game) ? '' : 'none';
      }
    }
  });
}

function switchEventsTab(tabEl, panel) {
  tabEl.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  document.getElementById('events-featured').style.display = panel === 'featured' ? '' : 'none';
  document.getElementById('events-community').style.display = panel === 'community' ? '' : 'none';
  // Show/hide TW toggle — only on 焦點大賽
  const twRow = document.getElementById('tw-toggle').parentElement;
  twRow.style.display = panel === 'featured' ? '' : 'none';
  // Re-apply TW filter
  if (panel === 'featured') {
    const twOn = document.getElementById('tw-toggle').classList.contains('on');
    applyTWFilter(twOn);
  }
}

function toggleTW(el) {
  el.classList.toggle('on');
  applyTWFilter(el.classList.contains('on'));
}

function applyTWFilter(twOn) {
  const cards = document.querySelectorAll('#page-events .event-card');
  cards.forEach(card => {
    if (twOn && card.dataset.tw === 'false') {
      card.style.display = 'none';
    } else {
      card.style.display = '';
    }
  });
}

function toggleOffline(btn) {
  const list = document.getElementById('offline-list');
  const isOpen = list.classList.contains('open');
  list.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
}

function switchHeroTab(tabEl, panelId) {
  // Update tab styles
  tabEl.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  // Switch hero panels
  document.querySelectorAll('.hero-panel').forEach(p => p.style.display = 'none');
  document.getElementById('hero-' + panelId).style.display = 'block';
}

function toggleExpand(linkEl) {
  const expand = linkEl.nextElementSibling;
  const isOpen = expand.classList.contains('open');
  expand.classList.toggle('open', !isOpen);
  linkEl.classList.toggle('open', !isOpen);
}

// ── Headroom: hide header on scroll down, show on scroll up ──
function setupHeadroom(contentEl, headerEl) {
  var lastY = 0;
  var ticking = false;
  contentEl.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        var y = contentEl.scrollTop;
        if (y > lastY && y > 60) {
          headerEl.classList.add('hidden');
        } else {
          headerEl.classList.remove('hidden');
        }
        lastY = y;
        ticking = false;
      });
      ticking = true;
    }
  });
}


// ════════════════════════════════════════════
// ── Hero 區 ──
async function loadHero() {
  try {
    const events = await fetchSheet('賽事');
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const visible = events.filter(ev =>
      ev['顯示'] !== false && ev['顯示'] !== 'FALSE' && ev['顯示'] !== 0
    );

    // 優先：進行中的焦點大賽
    let hero = visible.find(ev =>
      (ev['進行中'] === true || ev['進行中'] === 'TRUE') &&
      ev['分類'] === '焦點大賽'
    );

    // 其次：最近即將到來的焦點大賽
    if (!hero) {
      const upcoming = visible
        .filter(ev => {
          const start = ev['開始日期'] instanceof Date ? ev['開始日期'] : new Date(ev['開始日期'] || 0);
          return ev['分類'] === '焦點大賽' && start >= today;
        })
        .sort((a, b) => {
          const da = a['開始日期'] instanceof Date ? a['開始日期'] : new Date(a['開始日期'] || 0);
          const db = b['開始日期'] instanceof Date ? b['開始日期'] : new Date(b['開始日期'] || 0);
          return da - db;
        });
      hero = upcoming[0];
    }

    // 沒有賽事 → 隱藏整個 Hero 區塊
    if (!hero) {
      const heroHot = document.getElementById('hero-hot');
      const heroOfficial = document.getElementById('hero-official');
      const heroTabs = document.querySelector('#page-home .tabs');
      if (heroHot) heroHot.style.display = 'none';
      if (heroOfficial) heroOfficial.style.display = 'none';
      if (heroTabs) heroTabs.style.display = 'none';
      return;
    }

    const isLive = hero['進行中'] === true || hero['進行中'] === 'TRUE';
    const name = hero['名稱'] || '';
    const dateStr = formatDateRange(hero['開始日期'], hero['結束日期']);
    const shortDesc = hero['短介紹'] || '';
    const scheduleUrl = hero['賽程連結'] || '';
    const isTW = hero['台灣選手'] === true || hero['台灣選手'] === 'TRUE';

    // 藝術字
    const artEl = document.getElementById('hero-art-text');
    if (artEl) artEl.textContent = name.split(' ')[0] || name;

    // 熱門直播：沒有比賽時顯示「目前沒有觀賽派對」
    const hotContent = document.getElementById('hero-hot-content');
    if (hotContent) {
      if (!isLive) {
        // 即將到來的賽事
        hotContent.innerHTML = `
          <div class="hero-event-name">${name}</div>
          <div class="hero-sub">
            <span style="font-size:11px;color:var(--text2);">即將開始 · ${dateStr}</span>
          </div>
          ${shortDesc ? `<div style="font-size:12px;color:var(--text2);margin-top:4px;">${shortDesc}</div>` : ''}
          <div class="hero-cta">
            ${scheduleUrl ? `<a href="${scheduleUrl}" target="_blank"><button class="btn-primary">賽程表 →</button></a>` : ''}
            <button class="btn-ghost" onclick="showPage('events')">查看賽事</button>
          </div>`;
      } else {
        // 進行中但沒有觀賽派對
        hotContent.innerHTML = `
          <div class="hero-event-name">${name}</div>
          <div class="hero-sub">
            <span class="hero-live-badge">LIVE</span>
            目前沒有觀賽派對
          </div>
          <div class="hero-cta">
            ${scheduleUrl ? `<a href="${scheduleUrl}" target="_blank"><button class="btn-primary">賽程表 →</button></a>` : ''}
            <button class="btn-ghost" onclick="showPage('live')">查看直播</button>
          </div>`;
      }
    }

// Banner 輪播
// ════════════════════════════════════════════
const bannerTimers = {};

function renderBannerCarousel(containerId, slides) {
  const container = document.getElementById(containerId);
  if (!container) return;
  if (!slides || slides.length === 0) {
    container.innerHTML = '';
    container.style.display = 'none';
    return;
  }

  container.setAttribute('data-count', slides.length);

  // Build slides HTML
  let slidesHTML = slides.map((s, i) => {
    const isActive = i === 0 ? 'active' : '';
    const href = s['連結'] || '#';
    const hasImg = s['圖片網址'] && s['圖片網址'].startsWith('http');

    if (hasImg) {
      return `<a class="banner-slide ${isActive}" href="${href}" target="_blank">
        <img class="banner-slide-img" src="${s['圖片網址']}" alt="${s['標題'] || ''}">
      </a>`;
    } else {
      return `<a class="banner-slide ${isActive}" href="${href}" target="_blank" style="text-decoration:none;">
        <div class="banner-slide-text">
          <div class="banner-text-content">
            <strong>${s['標題'] || ''}</strong>
            ${s['說明文字'] || ''}
          </div>
          ${s['按鈕文字'] ? `<button class="banner-btn" onclick="event.preventDefault()">${s['按鈕文字']}</button>` : ''}
        </div>
      </a>`;
    }
  }).join('');

  // Dots
  const dotsHTML = slides.length > 1
    ? `<div class="banner-dots">${slides.map((_, i) =>
        `<div class="banner-dot ${i === 0 ? 'active' : ''}"></div>`
      ).join('')}</div>`
    : '';

  container.innerHTML = slidesHTML + dotsHTML;

  // Auto-rotate if more than 1 slide
  if (slides.length > 1) {
    let current = 0;
    if (bannerTimers[containerId]) clearInterval(bannerTimers[containerId]);
    bannerTimers[containerId] = setInterval(() => {
      const allSlides = container.querySelectorAll('.banner-slide');
      const allDots = container.querySelectorAll('.banner-dot');
      allSlides[current].classList.remove('active');
      allDots[current].classList.remove('active');
      current = (current + 1) % slides.length;
      allSlides[current].classList.add('active');
      allDots[current].classList.add('active');
    }, 8000);
  }
}

const SHEETS_ID = '1MBU9FQYsPqEwSgdAjmfxzOETK8vmBPY_JeNkP6vNgCw';
// 讀取 Sheets 某個分頁的所有資料
async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  const text = await res.text();
  // Google 回傳的格式有前綴要去掉
  const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
  return parseSheet(json);
}

// 把 gviz 格式轉成好用的物件陣列
function parseSheet(json) {
  const cols = json.table.cols.map(c => c.label);
  const colTypes = json.table.cols.map(c => c.type);
  const rows = json.table.rows || [];
  return rows.map(row => {
    const obj = {};
    cols.forEach((col, i) => {
      const cell = row.c[i];
      if (!cell || cell.v === null || cell.v === undefined) {
        obj[col] = '';
        return;
      }
      // Google gviz 日期格式是 "Date(year,month,day)" — month 從 0 開始
      if (colTypes[i] === 'date' || colTypes[i] === 'datetime') {
        const match = String(cell.v).match(/Date\((\d+),(\d+),(\d+)/);
        if (match) {
          const y = parseInt(match[1]);
          const m = parseInt(match[2]) + 1; // 轉成 1-based
          const d = parseInt(match[3]);
          obj[col] = new Date(y, m - 1, d);
        } else {
          obj[col] = new Date(cell.v);
        }
      } else {
        obj[col] = cell.v;
      }
    });
    return obj;
  });
}

// 日期格式化
function formatDateRange(start, end) {
  if (!start) return '';
  const s = start instanceof Date ? start : new Date(start);
  if (isNaN(s.getTime())) return '';
  const startStr = `${s.getMonth()+1}/${s.getDate()}`;
  if (!end) return `${startStr}（台灣時間）`;
  const e = end instanceof Date ? end : new Date(end);
  if (isNaN(e.getTime())) return `${startStr}（台灣時間）`;
  const endStr = `${e.getMonth()+1}/${e.getDate()}`;
  if (startStr === endStr) return `${startStr}（台灣時間）`;
  return `${startStr} ～ ${endStr}（台灣時間）`;
}

// 解析詳細說明裡的連結 [文字](url)
function parseLinks(text) {
  if (!text) return '';
  return text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent);text-decoration:none;">$1</a>');
}

// 月份標籤（跨年時顯示年份）
function getMonthLabel(dateVal) {
  if (!dateVal) return '';
  const d = dateVal instanceof Date ? dateVal : new Date(dateVal);
  if (isNaN(d.getTime())) return '';
  const thisYear = new Date().getFullYear();
  const year = d.getFullYear();
  const month = d.getMonth() + 1;
  return year !== thisYear ? `${year} 年 ${month} 月` : `${month} 月`;
}

// 月份分組 key（用於比較是否同一個月）
function getMonthKey(dateVal) {
  if (!dateVal) return '';
  const d = dateVal instanceof Date ? dateVal : new Date(dateVal);
  if (isNaN(d.getTime())) return '';
  return `${d.getFullYear()}-${d.getMonth()}`;
}

// 取得遊戲對應的 chip key
function getGameKey(gameName) {
  if (!gameName) return null; // null 代表非格鬥遊戲
  const name = gameName.trim();
  for (const game of FGC_GAMES) {
    if (game.names.some(n => name === n || name.includes(n) || n.includes(name))) {
      return game.key;
    }
  }
  return null; // null 代表非格鬥遊戲

// ── 載入直播狀態（從 Sheets 直播狀態分頁讀取，由 Apps Script 寫入）──
async function loadLiveStatus() {
  try {
    // 同時讀取兩個分頁
    const [streamers, liveStatuses] = await Promise.all([
      fetchSheet('實況名單'),
      fetchSheet('直播狀態'),
    ]);

    // 過濾顯示欄位
    const visible = streamers.filter(s =>
      s['顯示'] !== false && s['顯示'] !== 'FALSE' && s['顯示'] !== 0
    );

    // 建立直播狀態 Map（ID → 狀態）
    const liveMap = {};
    liveStatuses.forEach(row => {
      const id = String(row['Twitch/YouTube ID'] || '').trim();
      if (id) liveMap[id] = row;
    });

    // 分成在線和離線
    const liveStreamers = [];
    const offlineStreamers = [];

    visible.forEach(s => {
      const twitchId = String(s['Twitch ID'] || '').trim();
      const ytId = String(s['YouTube ID'] || '').trim();
      const statusId = twitchId || ytId;
      const status = liveMap[statusId] || liveMap[twitchId] || liveMap[ytId];
      const isOnline = status && (status['是否在線'] === 'TRUE' || status['是否在線'] === true);
      const currentGame = status ? String(status['當前遊戲'] || '').trim() : '';

      // 在線且在玩格鬥遊戲才進 LIVE 區塊，否則歸 offline
      if (isOnline && isFightingGame(currentGame)) {
        liveStreamers.push({ ...s, _status: status });
      } else {
        offlineStreamers.push(s);
      }
    });

    // 隨機排序
    [liveStreamers, offlineStreamers].forEach(arr => {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    });

    // 分出精選在線的頻道
    const featuredLive = liveStreamers.filter(s =>
      s['精選'] === true || s['精選'] === 'TRUE'
    );
    const otherLive = liveStreamers.filter(s =>
      s['精選'] !== true && s['精選'] !== 'TRUE'
    );

    // Hero 區
    updateHeroWithLive(featuredLive[0] || null);

    // 其他直播橫向滑動（精選在線，排除 hero 那個）
    updateHomeScroll(featuredLive.slice(1));

    renderLiveSection(liveStreamers);
    renderOfflineSection(offlineStreamers, visible.length);

  } catch(e) {
    console.error('載入直播狀態失敗', e);
  }
}

    console.error('載入實況名單失敗', e);
    const el = document.getElementById('offline-list');
    if (el) el.innerHTML = '<div class="error-placeholder">資料載入失敗</div>';
  }
}

// ── 載入首頁賽事 ──
async function loadHomeEvents() {
  try {
    const events = await fetchSheet('賽事');
    const today = new Date();
    today.setHours(0,0,0,0);

    // 過濾顯示欄位
    const visible = events.filter(ev =>
      ev['顯示'] !== false && ev['顯示'] !== 'FALSE' && ev['顯示'] !== 0
    );

    // 現正進行中
    const liveEvs = visible.filter(ev =>
      ev['進行中'] === true || ev['進行中'] === 'TRUE'
    );
    const liveContainer = document.getElementById('home-live-events');
    if (liveContainer) {
      if (liveEvs.length === 0) {
        liveContainer.innerHTML = '<div class="loading-placeholder" style="padding:12px 18px;">目前沒有進行中的賽事</div>';
      } else {
        liveContainer.innerHTML = liveEvs.map(ev => renderEventCard(ev, false)).join('');
      }
    }

    // 近期賽事（焦點大賽，未來，最多4筆，依日期排序）
    const upcomingEvs = visible
      .filter(ev => {
        const cat = ev['分類'] || '';
        const isLive = ev['進行中'] === true || ev['進行中'] === 'TRUE';
        if (isLive) return false;
        if (cat !== '焦點大賽') return false;
        const end = ev['結束日期'] instanceof Date ? ev['結束日期'] : (ev['結束日期'] ? new Date(ev['結束日期']) : null);
        return !end || end >= today;
      })
      .sort((a, b) => {
        const da = a['開始日期'] instanceof Date ? a['開始日期'] : new Date(a['開始日期'] || 0);
        const db = b['開始日期'] instanceof Date ? b['開始日期'] : new Date(b['開始日期'] || 0);
        return da - db;
      })
      .slice(0, 4);

    const upcomingContainer = document.getElementById('home-upcoming-events');
    if (upcomingContainer) {
      if (upcomingEvs.length === 0) {
        upcomingContainer.innerHTML = '<div class="loading-placeholder" style="padding:12px 18px;">近期沒有賽事</div>';
      } else {
        upcomingContainer.innerHTML = upcomingEvs.map(ev => renderEventCard(ev, false)).join('');
      }
    }
  } catch(e) {
    console.error('載入首頁賽事失敗', e);
    const containers = ['home-live-events', 'home-upcoming-events'];
    containers.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = '<div class="error-placeholder">資料載入失敗，請稍後再試</div>';
    });
  }
}

// ── 載入賽事頁 ──
async function loadEventsPage() {
  try {
    const events = await fetchSheet('賽事');
    const today = new Date();
    today.setHours(0,0,0,0);

    const visible = events.filter(ev =>
      ev['顯示'] !== false && ev['顯示'] !== 'FALSE' && ev['顯示'] !== 0
    );

    // 焦點大賽（依月份分組）
    const featured = visible.filter(ev => {
      const cat = ev['分類'] || '';
      const end = ev['結束日期'] ? new Date(ev['結束日期']) : null;
      const valid = !end || end >= today;
      return cat === '焦點大賽' && valid;
    });

    const featuredContainer = document.getElementById('events-featured');
    if (featuredContainer) {
      if (featured.length === 0) {
        featuredContainer.innerHTML = '<div class="loading-placeholder">目前沒有焦點大賽</div>';
      } else {
        // 依開始日期排序（由近到遠）
        featured.sort((a, b) => {
          const da = a['開始日期'] instanceof Date ? a['開始日期'] : new Date(a['開始日期'] || 0);
          const db = b['開始日期'] instanceof Date ? b['開始日期'] : new Date(b['開始日期'] || 0);
          return da - db;
        });
        // 依年月分組
        let html = '';
        let currentKey = '';
        featured.forEach(ev => {
          const key = getMonthKey(ev['開始日期']);
          if (key && key !== currentKey) {
            html += `<div class="month-label">${getMonthLabel(ev['開始日期'])}</div>`;
            currentKey = key;
          }
          html += renderEventCard(ev, false);
        });
        featuredContainer.innerHTML = html;
      }
    }

    // 社群&聯賽
    const community = visible.filter(ev => {
      const cat = ev['分類'] || '';
      return cat === '社群' || cat === '聯賽';
    });

    const commContainer = document.getElementById('events-community-cards');
    if (commContainer) {
      const leagues = community.filter(ev => ev['分類'] === '聯賽');
      const socials = community.filter(ev => ev['分類'] === '社群');

      let html = '';
      if (leagues.length > 0) {
        html += leagues.map(ev => renderEventCard(ev, false)).join('');
      }
      // 社群子標題
      const socialSection = document.getElementById('events-social-cards');
      if (socialSection) {
        socialSection.innerHTML = socials.map(ev => renderEventCard(ev, false)).join('') ||
          '<div class="loading-placeholder" style="padding:12px 18px;">目前沒有社群賽事</div>';
      }
      commContainer.innerHTML = html || '<div class="loading-placeholder" style="padding:12px 18px;">目前沒有聯賽</div>';
    }

  } catch(e) {
    console.error('載入賽事頁失敗', e);
    const el = document.getElementById('events-featured');
    if (el) el.innerHTML = '<div class="error-placeholder">資料載入失敗，請稍後再試</div>';
  }
}

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', function() {
  // Headroom
  document.querySelectorAll('.page').forEach(function(page) {
    var contentEl = page.querySelector('.content');
    var header = page.querySelector('header');
    if (contentEl && header) setupHeadroom(contentEl, header);
  });
  // 初始頁面
  initPageFromHash();
  // 資料載入
  loadHomeEvents();
  loadEventsPage();
  loadLiveStatus();
  loadBanners();
  loadHero();
  loadBanners();
  shuffleLiveCards();
  // 瀏覽器上一頁/下一頁
  window.addEventListener('popstate', initPageFromHash);
});

</script>
