<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>623Hub — FGC 原型</title>
<style>
  :root {
    --bg: #0B1020;
    --bg2: #131829;
    --card: #1C2236;
    --card2: #222840;
    --accent: #A855F7;
    --accent-dim: rgba(168,85,247,0.12);
    --accent-dim2: rgba(168,85,247,0.06);
    --text: #FFFFFF;
    --text2: #A0A8C0;
    --text3: #666A7A;
    --live-red: #FF4444;
    --radius: 10px;
    --radius-sm: 6px;
    --header-h: 56px;
    --nav-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  /* ── Page switcher (hidden) ── */
  .switcher { display: none; }

  /* ── Phone shell ── */
  .phone {
    width: 390px;
    height: 100vh;
    background: var(--bg);
    position: relative;
    margin-top: 0;
    overflow: hidden;
  }

  /* ── Pages ── */
  .page {
    display: none;
    flex-direction: column;
    height: 100vh;
    padding-bottom: var(--nav-h);
    position: relative;
  }
  .page.active { display: flex; }

  /* ── Header ── */
  header {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    background: var(--bg);
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: transform 0.28s ease, opacity 0.28s ease;
  }
  header.hidden {
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  .icon-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: var(--card);
    color: var(--text2);
    border: none;
    cursor: pointer;
    font-size: 16px;
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    width: 390px;
    height: var(--nav-h);
    background: var(--bg2);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 8px 0;
    color: var(--text3);
    font-size: 11px;
    transition: color 0.15s;
    border: none;
    background: none;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 22px; height: 22px; }

  /* ── Scrollable content ── */
  .content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-top: var(--header-h); margin-top: 0; }

  /* ── Section header ── */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 20px 18px 10px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 18px 10px;
  }
  .section-header h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .more-link {
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
  }

  /* ── Tags ── */
  .tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .tag-live {
    background: rgba(255,68,68,0.15);
    color: var(--live-red);
    border: 1px solid rgba(255,68,68,0.3);
  }
  .tag-tw {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(25,247,226,0.25);
  }
  .tag-game {
    background: var(--card2);
    color: var(--text2);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .tag-weekly {
    background: rgba(255,255,255,0.06);
    color: var(--text2);
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* ── Event card ── */
  .event-card {
    margin: 0 18px 8px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.04);
    position: relative;
  }
  .event-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .event-card-left { flex: 1; min-width: 0; }
  .event-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
  .event-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    line-height: 1.25;
  }
  .event-date {
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
  }
  .event-desc {
    font-size: 12px;
    color: var(--text3);
    margin-top: 6px;
  }
  .btn-schedule {
    padding: 7px 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }
  /* detail-link moved to expand section */

  /* ── Live card (list style) ── */
  .live-card {
    margin: 0 18px 8px;
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    overflow: hidden;
    gap: 0;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .live-card:hover { border-color: rgba(25,247,226,0.2); }
  .live-thumb {
    width: 110px;
    height: 72px;
    background: var(--card2);
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .live-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .live-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a2240, #2a3460);
  }
  .live-dot {
    position: absolute;
    top: 6px; left: 6px;
    background: var(--live-red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }
  .live-info {
    flex: 1;
    padding: 10px 14px;
    min-width: 0;
  }
  .live-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .live-game {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }
  .live-platform {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 5px;
    font-size: 11px;
    color: var(--text3);
  }
  .live-avatar {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--card2);
    overflow: hidden;
    flex-shrink: 0;
  }
  .live-avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    justify-content: center;
    padding: 0 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 4px;
  }
  .tab {
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* ── Game filter chips ── */
  .filter-chips {
    display: flex;
    gap: 8px;
    padding: 12px 18px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-chips::-webkit-scrollbar { display: none; }
  .chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── HOMEPAGE ── */

  /* Hero */
  .hero {
    position: relative;
    margin: 12px 18px 0;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--card);
  }
  .hero-img {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #1a2240 0%, #0d1830 50%, #1a2840 100%);
    position: relative;
    display: flex;
    align-items: flex-end;
  }
  .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(11,16,32,0.95) 0%, rgba(11,16,32,0.3) 50%, transparent 100%);
  }
  .hero-content {
    position: relative;
    padding: 14px 16px;
    width: 100%;
  }
  .hero-event-name {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1.2;
  }
  .hero-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hero-live-badge {
    background: var(--live-red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.08em;
  }
  .hero-cta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }
  .btn-primary {
    padding: 8px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
  }
  .btn-ghost {
    padding: 8px 14px;
    background: transparent;
    color: var(--text2);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }

  /* Hero placeholder art */
  .hero-art {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.18;
    font-size: 72px;
    letter-spacing: -4px;
    font-weight: 900;
    color: var(--accent);
    user-select: none;
  }

  /* Horizontal live scroll */
  .live-scroll {
    display: flex;
    gap: 10px;
    padding: 0 18px 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .live-scroll::-webkit-scrollbar { display: none; }
  .live-scroll-card {
    flex-shrink: 0;
    width: 130px;
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .live-scroll-card:hover { border-color: rgba(25,247,226,0.2); }
  .live-scroll-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #1a2240, #2a3460);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: rgba(255,255,255,0.15);
  }
  .live-scroll-info {
    padding: 8px 10px;
  }
  .live-scroll-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .live-scroll-game {
    font-size: 10px;
    color: var(--text2);
    margin-top: 2px;
  }

  /* Banner */
  .banner {
    margin: 24px 18px 8px;
    border-radius: var(--radius);
    overflow: hidden;
    background: linear-gradient(135deg, #1C2236, #252d45);
    border: 1px solid rgba(25,247,226,0.1);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .banner-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
  }
  .banner-text strong { color: var(--text); display: block; font-size: 14px; margin-bottom: 2px; }
  .banner-btn {
    padding: 7px 14px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── Banner carousel ── */
  .banner-carousel {
    margin: 24px 18px 8px;
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
  }
  .banner-slide {
    display: none;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    text-decoration: none;
  }
  .banner-slide.active { display: block; }
  /* 有圖片的 banner */
  .banner-slide-img {
    width: 100%;
    aspect-ratio: 3/1;
    object-fit: cover;
    display: block;
  }
  /* 無圖片的 banner（文字版）*/
  .banner-slide-text {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 18px;
    background: linear-gradient(135deg, #1C1A2E, #252040);
    border: 1px solid rgba(168,85,247,0.1);
    border-radius: var(--radius);
  }
  .banner-slide-body {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.4;
  }
  .banner-slide-body strong {
    color: var(--text);
    display: block;
    font-size: 14px;
    margin-bottom: 2px;
  }
  /* 分頁點點 */
  .banner-dots {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-top: 8px;
  }
  .banner-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.2s, width 0.2s;
    cursor: pointer;
  }
  .banner-dot.active {
    background: var(--accent);
    width: 14px;
    border-radius: 3px;
  }

  /* divider */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.04);
    margin: 4px 0;
  }

  /* ── EVENTS PAGE ── */
  .section-sub-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.06em;
    padding: 18px 18px 8px;
    text-transform: uppercase;
  }
  .month-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.05em;
    padding: 16px 18px 8px;
    text-transform: uppercase;
  }

  /* toggle row */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 18px 0;
  }
  .toggle-label {
    font-size: 12px;
    color: var(--text2);
  }
  .toggle {
    width: 36px; height: 20px;
    background: var(--card2);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08);
    transition: background 0.2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(16px); }

  /* ── OFFLINE divider in live page ── */
  .offline-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px 10px;
  }
  .offline-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .offline-line {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }

  /* ── Offline toggle button ── */
  .offline-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 18px;
    cursor: pointer;
    color: var(--text3);
    font-size: 12px;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    transition: color 0.15s;
  }
  .offline-toggle:hover { color: var(--text2); }
  .offline-toggle-line {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
  }
  .offline-toggle-label {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 11px;
  }
  .offline-arrow {
    display: inline-block;
    transition: transform 0.25s ease;
    font-style: normal;
    font-size: 10px;
  }
  .offline-toggle.open .offline-arrow { transform: rotate(90deg); }

  /* ── Offline list ── */
  .offline-list {
    display: none;
  }
  .offline-list.open { display: block; }

  /* page title area */
  .page-title-area {
    padding: 16px 18px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .page-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .page-title span { color: var(--accent); }

  /* LIVE LIVE big header */
  .live-header {
    padding: 16px 18px 0;
  }
  .live-title {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .live-title-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--live-red);
    box-shadow: 0 0 8px var(--live-red);
    animation: pulse 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* empty space at bottom of offline */
  .spacer { height: 20px; }

  /* ── Loading placeholder ── */
  .loading-placeholder {
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    padding: 32px 18px;
  }
  .error-placeholder {
    text-align: center;
    color: var(--live-red);
    font-size: 12px;
    padding: 20px 18px;
    opacity: 0.7;
  }

  /* ── Three-dot menu ── */
  .menu-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    align-items: flex-start;
    justify-content: flex-end;
  }
  .menu-overlay.open { display: flex; }
  .menu-panel {
    margin: 52px 12px 0 0;
    background: #1C1A2E;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    min-width: 200px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .menu-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .menu-site-name {
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .menu-site-name span { color: var(--accent); }
  .menu-site-desc {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    line-height: 1.5;
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 16px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s, color 0.15s;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .menu-item-icon { font-size: 16px; width: 20px; text-align: center; }
  .menu-about {
    display: none;
    padding: 10px 16px 14px;
    font-size: 12px;
    color: var(--text3);
    line-height: 1.7;
    border-top: 1px solid rgba(255,255,255,0.04);

<script>
// ── 畫面上方的卡片隨機打亂 ──
function shuffleLiveCards() {
  const liveSection = document.querySelector('#page-live .content');
  if (!liveSection) return;
  const onlineCards = Array.from(liveSection.querySelectorAll('.live-card:not(.offline-list .live-card)'));
  if (onlineCards.length < 2) return;
  const offlineSection = document.getElementById('offline-section');
  for (let i = onlineCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [onlineCards[i], onlineCards[j]] = [onlineCards[j], onlineCards[i]];
  }
  onlineCards.forEach(card => {
    if (offlineSection) liveSection.insertBefore(card, offlineSection);
    else liveSection.appendChild(card);
  });
}

// ── 頁面切換控制 ──
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + id);
  if (target) target.classList.add('active');
  const content = target ? target.querySelector('.content') : null;
  if (content) content.scrollTop = 0;

  // 更新導覽列高亮狀態
  document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
    if (item.getAttribute('data-page') === id) {
      item.classList.add('active');
    } else {
      item.classList.remove('active');
    }
  });

  // 更新頁面切換器按鈕（測試用）
  if (btn && btn.closest('.switcher')) {
    btn.closest('.switcher').querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
}

// ── 直播頁：遊戲篩選 Chip 點擊事件 ──
function filterGame(game, chipEl) {
  chipEl.closest('.filter-chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');

  const cards = document.querySelectorAll('#page-live .live-card');
  cards.forEach(card => {
    if (game === 'all') {
      if (!card.closest('.offline-list')) {
        card.style.display = '';
      }
    } else {
      if (!card.closest('.offline-list')) {
        card.style.display = (card.dataset.game === game) ? '' : 'none';
      }
    }
  });
}

// ── 賽事頁：切換「焦點大賽」與「社群賽事」 ──
function switchEventsTab(tabEl, panel) {
  tabEl.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  document.getElementById('events-featured').style.display = panel === 'featured' ? '' : 'none';
  document.getElementById('events-community').style.display = panel === 'community' ? '' : 'none';
  
  const twRow = document.getElementById('tw-toggle').parentElement;
  twRow.style.display = panel === 'featured' ? '' : 'none';
  if (panel === 'featured') {
    const twOn = document.getElementById('tw-toggle').classList.contains('on');
    applyTWFilter(twOn);
  }
}

// ── 賽事頁：台灣選手篩選開關 ──
function toggleTW(el) {
  el.classList.toggle('on');
  applyTWFilter(el.classList.contains('on'));
}

function applyTWFilter(twOn) {
  const cards = document.querySelectorAll('#page-events .event-card');
  cards.forEach(card => {
    if (twOn && card.dataset.tw === 'false') {
      card.style.display = 'none';
    } else {
      card.style.display = '';
    }
  });
}

// ── 直播頁：展開/收合離線名單 ──
function toggleOffline(btn) {
  const list = document.getElementById('offline-list');
  const isOpen = list.classList.contains('open');
  list.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
}

// ── 首頁：大看板英雄榜 Tab 切換 ──
function switchHeroTab(tabEl, panelId) {
  tabEl.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  document.querySelectorAll('.hero-panel').forEach(p => p.style.display = 'none');
  const targetPanel = document.getElementById('hero-' + panelId);
  if (targetPanel) targetPanel.style.display = 'block';
}

// ── 賽事說明詳細展開 ──
function toggleExpand(linkEl) {
  const expand = linkEl.nextElementSibling;
  const isOpen = expand.classList.contains('open');
  expand.classList.toggle('open', !isOpen);
  linkEl.classList.toggle('open', !isOpen);
}

// ── Headroom 效果（往下滑隱藏 Header，往上滑顯示） ──
function setupHeadroom(contentEl, headerEl) {
  var lastY = 0;
  var ticking = false;
  contentEl.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        var y = contentEl.scrollTop;
        if (y > lastY && y > 60) {
          headerEl.classList.add('hidden');
        } else if (y < lastY) {
          headerEl.classList.remove('hidden');
        }
        lastY = y;
        ticking = false;
      });
      ticking = true;
    }
  });
}

// ── 三點功能選單控制 ──
function openMenu() { document.getElementById('menu-overlay').classList.add('open'); }
function closeMenu(e) { document.getElementById('menu-overlay').classList.remove('open'); }
function toggleAbout(btn) { document.getElementById('menu-about').classList.toggle('open'); }

// ── 首頁：大看板渲染邏輯 ──
function renderHomeFeatured(events) {
  const today = new Date();
  today.setHours(0,0,0,0);
  
  const liveEvs = events.filter(e => e['進行中'] === true || e['進行中'] === 'TRUE');
  const upcoming = events.filter(e => {
    const sd = e['開始日期'] instanceof Date ? e['開始日期'] : new Date(e['開始日期'] || 0);
    return sd >= today && (e['進行中'] !== true && e['進行中'] !== 'TRUE');
  });

  let hero = null;
  if (liveEvs.length > 0) {
    hero = liveEvs[0];
  } else if (upcoming.length > 0) {
    upcoming.sort((a,b) => {
      const da = a['開始日期'] instanceof Date ? a['開始日期'] : new Date(a['開始日期'] || 0);
      const db = b['開始日期'] instanceof Date ? b['開始日期'] : new Date(b['開始日期'] || 0);
      return da - db;
    });
    hero = upcoming[0];
  }

  if (!hero) {
    const heroHot = document.getElementById('hero-hot');
    const heroOfficial = document.getElementById('hero-official');
    const heroTabs = document.querySelector('#page-home .tabs');
    if (heroHot) heroHot.style.display = 'none';
    if (heroOfficial) heroOfficial.style.display = 'none';
    if (heroTabs) heroTabs.style.display = 'none';
    return;
  }

  const isLive = hero['進行中'] === true || hero['進行中'] === 'TRUE';
  const name = hero['名稱'] || '';
  const dateStr = formatDateRange(hero['開始日期'], hero['結束日期']);
  const shortDesc = hero['短介紹'] || '';
  const scheduleUrl = hero['賽程連結'] || '';

  const artEl = document.getElementById('hero-art-text');
  if (artEl) artEl.textContent = name.split(' ')[0] || name;

  const hotContent = document.getElementById('hero-hot-content');
  if (hotContent) {
    if (!isLive) {
      hotContent.innerHTML = `
        <div class="hero-event-name">${name}</div>
        <div class="hero-sub">
          <span style="font-size:11px;color:var(--text2);">即將開始 · ${dateStr}</span>
        </div>
        ${shortDesc ? `<div style="font-size:12px;color:var(--text2);margin-top:4px;">${shortDesc}</div>` : ''}
        <div class="hero-cta">
          ${scheduleUrl ? `<a href="${scheduleUrl}" target="_blank"><button class="btn-primary">賽程表 →</button></a>` : ''}
          <button class="btn-ghost" onclick="showPage('events')">查看賽事</button>
        </div>`;
    } else {
      hotContent.innerHTML = `
        <div class="hero-event-name">${name}</div>
        <div class="hero-sub">
          <span class="hero-live-badge">LIVE</span> 目前沒有觀賽派對
        </div>
        <div class="hero-cta">
          ${scheduleUrl ? `<a href="${scheduleUrl}" target="_blank"><button class="btn-primary">賽程表 →</button></a>` : ''}
          <button class="btn-ghost" onclick="showPage('live')">查看直播</button>
        </div>`;
    }
  }

  const officialContent = document.getElementById('hero-official-content');
  const officialArt = document.getElementById('hero-official-art');
  if (officialArt) officialArt.textContent = name.split(' ')[0] || name;
  if (officialContent) {
    officialContent.innerHTML = `
      <div class="hero-event-name">${name}</div>
      <div class="hero-sub">
        ${isLive ? '<span class="hero-live-badge">LIVE</span> 大會官方主台' : `<span style="font-size:11px;color:var(--text2);">${dateStr}</span>`}
      </div>
      <div class="hero-cta">
        <button class="btn-primary" onclick="showPage('live')">前往直播主頁 →</button>
      </div>`;
  }
}

// ── 橫幅廣告 (Banner) 輪播控制 ──
let bannerTimers = {};
function renderBannerCarousel(containerId, slides) {
  const container = document.getElementById(containerId);
  if (!container) return;
  if (slides.length === 0) {
    container.style.display = 'none';
    return;
  }
  const slidesHTML = slides.map((s, i) => {
    const link = s['點擊連結'] || '#';
    if (s['圖片網址']) {
      return `<a href="${link}" target="_blank" class="banner-slide ${i === 0 ? 'active' : ''}"><img src="${s['圖片網址']}" class="banner-slide-img"></a>`;
    } else {
      return `
        <a href="${link}" target="_blank" style="text-decoration:none;" class="banner-slide ${i === 0 ? 'active' : ''}">
          <div class="banner-slide-text">
            <div class="banner-slide-body">
              <strong>${s['標題'] || ''}</strong>
              ${s['說明文字'] || ''}
            </div>
            ${s['按鈕文字'] ? `<button class="banner-btn" onclick="event.preventDefault()">${s['按鈕文字']}</button>` : ''}
          </div>
        </a>`;
    }
  }).join('');

  const dotsHTML = slides.length > 1 ? `<div class="banner-dots">${slides.map((_, i) => `<div class="banner-dot ${i === 0 ? 'active' : ''}"></div>`).join('')}</div>` : '';
  container.innerHTML = slidesHTML + dotsHTML;

  if (slides.length > 1) {
    let current = 0;
    if (bannerTimers[containerId]) clearInterval(bannerTimers[containerId]);
    bannerTimers[containerId] = setInterval(() => {
      const allSlides = container.querySelectorAll('.banner-slide');
      const allDots = container.querySelectorAll('.banner-dot');
      if (!allSlides[current] || !allDots[current]) return;
      allSlides[current].classList.remove('active');
      allDots[current].classList.remove('active');
      current = (current + 1) % slides.length;
      allSlides[current].classList.add('active');
      allDots[current].classList.add('active');
    }, 8000);
  }
}

const SHEETS_ID = '1MBU9FQYsPqEwSgdAjmfxzOETK8vmBPY_JeNkP6vNgCw'; 

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const resp = await fetch(url);
  const text = await resp.text();
  const json = JSON.parse(text.substring(47, text.length - 2));
  
  const cols = json.table.cols.map(c => c ? c.label : '');
  const colTypes = json.table.cols.map(c => c ? c.type : '');
  const rows = json.table.rows || [];
  
  return rows.map(row => {
    const obj = {};
    cols.forEach((col, i) => {
      if (!col) return;
      const cell = row.c[i];
      if (!cell || cell.v === null || cell.v === undefined) {
        obj[col] = '';
        return;
      }
      if (colTypes[i] === 'date' || colTypes[i] === 'datetime') {
        const match = String(cell.v).match(/Date\((\d+),(\d+),(\d+)/);
        if (match) {
          const y = parseInt(match[1]);
          const m = parseInt(match[2]) + 1;
          const d = parseInt(match[3]);
          obj[col] = new Date(y, m - 1, d);
        } else {
          obj[col] = new Date(cell.v);
        }
      } else {
        obj[col] = cell.v;
      }
    });
    return obj;
  });
}

// 日期格式化工具
function formatDateRange(start, end) {
  if (!start) return '';
  const s = start instanceof Date ? start : new Date(start);
  if (isNaN(s.getTime())) return '';
  const startStr = `${s.getMonth()+1}/${s.getDate()}`;
  if (!end) return `${startStr}（台灣時間）`;
  const e = end instanceof Date ? end : new Date(end);
  if (isNaN(e.getTime())) return `${startStr}（台灣時間）`;
  const endStr = `${e.getMonth()+1}/${e.getDate()}`;
  if (startStr === endStr) return `${startStr}（台灣時間）`;
  return `${startStr} ～ ${endStr}（台灣時間）`;
}

// 解析詳細說明裡的 Markdown 連結格式 [文字](url)
function parseLinks(text) {
  if (!text) return '';
  return text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent);text-decoration:none;">$1</a>');
}

function renderEventCard(ev, isTwFiltered) {

function getMonthLabel(dateVal) {
  if (!dateVal) return '';
  const d = dateVal instanceof Date ? dateVal : new Date(dateVal);
  if (isNaN(d.getTime())) return '';
  const thisYear = new Date().getFullYear();
  return d.getFullYear() !== thisYear ? `${d.getFullYear()} 年 ${d.getMonth() + 1} 月` : `${d.getMonth() + 1} 月`;
}

function getMonthKey(dateVal) {
  if (!dateVal) return '';
  const d = dateVal instanceof Date ? dateVal : new Date(dateVal);
  if (isNaN(d.getTime())) return '';
  return `${d.getFullYear()}-${d.getMonth()}`;
}

const GAME_KEY_MAP = {
  'Street Fighter 6': 'sf6', 'SF6': 'sf6',
  'The King of Fighters XV': 'kof', 'KOF XV': 'kof',
  'Fatal Fury: City of the Wolves': 'cotw', 'CotW': 'cotw', '餓狼': 'cotw',
  'Guilty Gear: Strive': 'ggst', 'GGST': 'ggst',
  'Granblue Fantasy Versus: Rising': 'gbvsr', 'GBVSR': 'gbvsr',
  'Tekken 8': 'tk8', 'TK8': 'tk8', '鐵拳 8': 'tk8',
};

function getGameKey(gameName) {
  if (!gameName) return 'other';
  for (const [k, v] of Object.entries(GAME_KEY_MAP)) {
    if (gameName.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return 'other';
}

function gameToKey(gameName) {
  return getGameKey(gameName);
}

function renderLiveSection(liveStreamers) {
  const livePage = document.querySelector('#page-live .content');

  // 移除舊的假資料
  livePage.querySelectorAll('.live-card:not(#offline-list .live-card)').forEach(c => {
    const parentA = c.closest('a');
    if (parentA) parentA.remove();
    else c.remove();
  });

  const offlineSection = document.getElementById('offline-section');
  if (liveStreamers.length === 0) {
    const emptyMsg = document.createElement('div');
    emptyMsg.className = 'loading-placeholder';
    emptyMsg.style.padding = '20px 18px';
    emptyMsg.textContent = '目前沒有直播';
    if (offlineSection) livePage.insertBefore(emptyMsg, offlineSection);
  } else {
    liveStreamers.forEach(s => {
      const div = document.createElement('div');
      div.innerHTML = renderLiveCard(s);
      const card = div.firstElementChild;
      if (offlineSection) livePage.insertBefore(card, offlineSection);
      else livePage.appendChild(card);

  const homeScroll = document.getElementById('home-live-scroll');
  const homeScrollSection = document.getElementById('home-live-scroll-section');

      homeScrollSection.style.display = 'none';

      homeScrollSection.style.display = 'block';
      homeScroll.innerHTML = liveStreamers.map(s => {

// ── 主驅動程式：改為撈取新分頁「直播狀態」 ──
async function loadLiveStatus() {
  try {
    const streamers = await fetchSheet('直播狀態');
    const liveStreamers = [];
    const offlineStreamers = [];

    streamers.forEach(s => {
      if (!s['Twitch ID']) return; // 過濾空白列

      const status = s['是否在線'];
      const isLive = (status === '在線' || status === '開台ing' || status === 'TRUE' || status === true);

      if (isLive) {
        liveStreamers.push(s);
      } else {
        offlineStreamers.push(s);
      }
    });

    // 隨機排序打亂順序，讓首頁和列表每次進來更有變化
    for (let i = liveStreamers.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [liveStreamers[i], liveStreamers[j]] = [liveStreamers[j], liveStreamers[i]];
    }
    for (let i = offlineStreamers.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [offlineStreamers[i], offlineStreamers[j]] = [offlineStreamers[j], offlineStreamers[i]];
    }

    renderLiveSection(liveStreamers);
    renderOfflineSection(offlineStreamers, streamers.length);
  } catch(e) {
    console.error('載入直播狀態失敗', e);
  }
}

// ── 載入賽事頁資料 ──
async function loadEventsPage() {
  try {
    const events = await fetchSheet('賽事');
    const today = new Date();
    today.setHours(0,0,0,0);
    
    const visible = events.filter(e => e['顯示'] !== false && e['顯示'] !== 'FALSE' && e['顯示'] !== 0);
    const featured = visible.filter(e => e['分類'] === '焦點大賽');
    
    featured.sort((a,b) => {
      const isALive = a['進行中'] === true || a['進行中'] === 'TRUE';
      const isBLive = b['進行中'] === true || b['進行中'] === 'TRUE';
      if (isALive && !isBLive) return -1;
      if (!isALive && isBLive) return 1;
      const da = a['開始日期'] instanceof Date ? a['開始日期'] : new Date(a['開始日期'] || 0);
      const db = b['開始日期'] instanceof Date ? b['開始日期'] : new Date(b['開始日期'] || 0);
      return da - db;
    });

    const featContainer = document.getElementById('events-featured-cards');
    if (featContainer) {
      if (featured.length === 0) {
        featContainer.innerHTML = '<div class="loading-placeholder">目前沒有焦點大賽</div>';
      } else {
        let lastMonthKey = '';
        let html = '';
        featured.forEach(ev => {
          const isLive = ev['進行中'] === true || ev['進行中'] === 'TRUE';
          if (isLive) {
            html += renderEventCard(ev, false);
          } else {
            const mKey = getMonthKey(ev['開始日期']);
            if (mKey !== lastMonthKey) {
              html += `<div class="month-label">${getMonthLabel(ev['開始日期'])}</div>`;
              lastMonthKey = mKey;
            }
            html += renderEventCard(ev, false);
          }
        });
        featContainer.innerHTML = html;
      }
    }

    const community = visible.filter(e => e['分類'] === '社群賽事' || e['分類'] === '聯賽' || e['分類'] === '社群');
    const commContainer = document.getElementById('events-community-cards');
    if (commContainer) {
      const leagues = community.filter(ev => ev['分類'] === '聯賽');
      const socials = community.filter(ev => ev['分類'] === '社群' || ev['分類'] === '社群賽事');
      let html = '';
      if (leagues.length > 0) {
        html += leagues.map(ev => renderEventCard(ev, false)).join('');
      }
      const socialSection = document.getElementById('events-social-cards');
      if (socialSection) {
        socialSection.innerHTML = socials.map(ev => renderEventCard(ev, false)).join('') || '<div class="loading-placeholder" style="padding:12px 18px;">目前沒有社群賽事</div>';
      }
      commContainer.innerHTML = html || '<div class="loading-placeholder" style="padding:12px 18px;">目前沒有聯賽</div>';
    }
  } catch(e) {
    console.error('載入賽事頁失敗', e);
    const el = document.getElementById('events-featured');
    if (el) el.innerHTML = '<div class="error-placeholder">資料載入失敗，請稍後再試</div>';
  }
}
