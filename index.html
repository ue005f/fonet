<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>623Hub — FGC 原型</title>
<style>
  :root {
    --bg: #0B1020;
    --bg2: #131829;
    --card: #1C2236;
    --card2: #222840;
    --accent: #A855F7;
    --accent-dim: rgba(168,85,247,0.12);
    --accent-dim2: rgba(168,85,247,0.06);
    --text: #FFFFFF;
    --text2: #A0A8C0;
    --text3: #666A7A;
    --live-red: #FF4444;
    --radius: 10px;
    --radius-sm: 6px;
    --header-h: 56px;
    --nav-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    /* ── 已修改：從固定 390px 改為 RWD 響應式寬度 ── */
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  /* 頁面基本結構適應父層 */
  .page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    display: none;
    flex-direction: column;
    background: var(--bg);
  }
  .page.active { display: flex; }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    padding-bottom: calc(var(--nav-h) + 20px);
    scroll-behavior: smooth;
  }

  /* Header & Navigation */
  header {
    height: var(--header-h);
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 10;
    transition: transform 0.2s ease-in-out;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  header.headroom--hidden {
    transform: translateY(-100%);
  }

  .brand {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #FFF 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    height: var(--nav-h);
    background: rgba(19, 24, 41, 0.94);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 100;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--text3);
    text-decoration: none;
    font-size: 11px;
    font-weight: 500;
    transition: color 0.2s;
    flex: 1;
    padding: 8px 0;
  }
  .nav-item svg {
    width: 20px;
    height: 20px;
    margin-bottom: 4px;
    fill: currentColor;
    transition: transform 0.2s;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item.active svg { transform: translateY(-1px); }

  /* 元件樣式 */
  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.02);
  }

  /* 直播卡片樣式 */
  .live-card {
    display: flex;
    gap: 12px;
  }
  .live-thumb {
    position: relative;
    width: 120px;
    height: 68px;
    background: #000;
    border-radius: var(--radius-sm);
    overflow: hidden;
    flex-shrink: 0;
  }
  .live-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .badge-live {
    position: absolute;
    top: 4px;
    left: 4px;
    background: var(--live-red);
    color: #fff;
    font-size: 9px;
    font-weight: 800;
    padding: 1px 4px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }
  .live-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }
  
  /* ── 已修改：.live-title 變更為 .live-card-title 避免撞名 ── */
  .live-card-title {
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  
  .live-meta {
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .game-tag {
    display: inline-block;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    width: fit-content;
  }

  /* 賽事卡片樣式 */
  .event-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .event-date {
    text-align: center;
    padding-right: 12px;
    border-right: 1px solid rgba(255,255,255,0.08);
    min-width: 50px;
  }
  .date-day { font-size: 16px; font-weight: 700; color: #fff; }
  .date-month { font-size: 10px; color: var(--text2); text-transform: uppercase; }
  .event-detail {
    flex: 1;
    padding-left: 12px;
    min-width: 0;
  }
  .event-name {
    font-weight: 600;
    font-size: 14px;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .event-status {
    font-size: 11px;
    margin-top: 2px;
  }
  .status-open { color: #10B981; font-weight: 500; }
  .status-ended { color: var(--text3); }

  .loading-placeholder, .error-placeholder {
    text-align: center;
    color: var(--text3);
    padding: 24px;
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="page-home" class="page active">
  <header>
    <div class="brand">623Hub</div>
  </header>
  <div class="content">
    <div class="section-title">線上直播</div>
    <div id="live-container">
      <div class="card live-card">
        <div class="live-thumb">
          <div class="badge-live">LIVE</div>
          <div style="width:100%; height:100%; background:#222840;"></div>
        </div>
        <div class="live-info">
          <div class="live-card-title">大賽秋季賽決選 - 八強對決</div>
          <div class="live-meta">隨機轉播中</div>
          <div class="game-tag">SF6</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="page-events" class="page">
  <header>
    <div class="brand">賽事資訊</div>
  </header>
  <div class="content">
    <div class="section-title">焦點推薦</div>
    <div id="events-featured"></div>
    
    <div class="section-title" style="margin-top: 20px;">社群賽事</div>
    <div id="events-social-cards"></div>
  </div>
</div>

<div id="page-profile" class="page">
  <header>
    <div class="brand">個人檔案</div>
  </header>
  <div class="content">
    <div class="card" style="text-align:center; padding: 24px 16px;">
      <div style="width:64px; height:64px; background:var(--accent-dim); border-radius:50%; margin:0 auto 12px; display:flex; align-items:center; justify-content:center; color:var(--accent); font-weight:700; font-size:20px;">G</div>
      <div style="font-weight:600; font-size:16px;">格鬥玩家</div>
      <div style="font-size:12px; color:var(--text3); margin-top:4px;">歡迎來到 623Hub</div>
    </div>
  </div>
</div>

<nav>
  <a href="#home" class="nav-item active" data-target="home">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    首頁
  </a>
  <a href="#events" class="nav-item" data-target="events">
    <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"/></svg>
    賽事
  </a>
  <a href="#profile" class="nav-item" data-target="profile">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    我的
  </a>
</nav>

<script>
// 模擬賽事資料
const community = [
  { "分類": "聯賽", "名稱": "CPT 2026 線上白金賽", "日期": "06-25", "狀態": "報名中" },
  { "分類": "社群", "名稱": "週五格鬥之夜快打旋風聚會", "日期": "06-19", "狀態": "報名中" },
  { "分類": "社群", "名稱": "格鬥天王拳皇格鬥賽", "日期": "07-02", "狀態": "未開放" }
];

// Headroom 滾動隱藏頂欄機制
function setupHeadroom(contentEl, headerEl) {
  let lastScrollTop = 0;
  contentEl.addEventListener('scroll', function() {
    let ts = contentEl.scrollTop;
    if (ts > lastScrollTop && ts > 56) {
      headerEl.classList.add('headroom--hidden');
    } else {
      headerEl.classList.remove('headroom--hidden');
    }
    lastScrollTop = ts;
  });
}

// 頁面切換機制
function initPageFromHash() {
  const hash = window.location.hash.replace('#', '') || 'home';
  
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  
  const targetPage = document.getElementById(`page-${hash}`);
  const targetNav = document.querySelector(`.nav-item[data-target="${hash}"]`);
  
  if (targetPage) targetPage.classList.add('active');
  if (targetNav) targetNav.classList.add('active');

  if (hash === 'events') {
    loadEventsPage();
  }
}

window.addEventListener('hashchange', initPageFromHash);

function renderEventCard(ev, isFeatured) {
  const dateParts = ev['日期'].split('-');
  const day = dateParts[1] || '01';
  const month = dateParts[0] || 'JAN';
  const statusClass = ev['狀態'] === '報名中' ? 'status-open' : 'status-ended';
  
  return `
    <div class="card event-card">
      <div class="event-date">
        <div class="date-day">${day}</div>
        <div class="date-month">${month}月</div>
      </div>
      <div class="event-detail">
        <div class="event-name">${ev['名稱']}</div>
        <div class="event-status ${statusClass}">${ev['狀態']}</div>
      </div>
    </div>
  `;
}

async function loadEventsPage() {
  try {
    const featuredContainer = document.getElementById('events-featured');
    if (featuredContainer) {
      featuredContainer.innerHTML = community.slice(0, 1).map(ev => renderEventCard(ev, true)).join('');
    }

    const commContainer = document.getElementById('events-social-cards');
    if (commContainer) {
      const leagues = community.filter(ev => ev['分類'] === '聯賽');
      const socials = community.filter(ev => ev['分類'] === '社群');

      let html = '';
      if (leagues.length > 0) {
        html += leagues.map(ev => renderEventCard(ev, false)).join('');
      }
      
      const socialSection = document.getElementById('events-social-cards');
      if (socialSection) {
        socialSection.innerHTML = socials.map(ev => renderEventCard(ev, false)).join('') ||
          '<div class="loading-placeholder" style="padding:12px 18px;">目前沒有社群賽事</div>';
      }
    }
  } catch(e) {
    console.error('載入賽事頁失敗', e);
    const el = document.getElementById('events-featured');
    if (el) el.innerHTML = '<div class="error-placeholder">資料載入失敗，請稍後再試</div>';
  }
}

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.page').forEach(function(page) {
    var contentEl = page.querySelector('.content');
    var header = page.querySelector('header');
    if (contentEl && header) setupHeadroom(contentEl, header);
  });
  initPageFromHash();
});
</script>
</body>
</html>
