<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>623Hub — 台灣格鬥遊戲賽事與直播資訊</title>
<style>
  :root {
    --bg: #0B1020;
    --bg2: #131829;
    --card: #1C2236;
    --card2: #222840;
    --accent: #A855F7;
    --accent-dim: rgba(168,85,247,0.12);
    --accent-dim2: rgba(168,85,247,0.06);
    --text: #FFFFFF;
    --text2: #A0A8C0;
    --text3: #666A7A;
    --live-red: #FF4444;
    --radius: 12px;
    --radius-sm: 8px;
    --rail-w: 88px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  /* ── App shell: 左側導覽 + 中間主區 + 右側資訊欄 ── */
  .app-shell {
    display: flex;
    min-height: 100vh;
  }

  /* ── 左側導覽欄 ── */
  .side-rail {
    width: var(--rail-w);
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    position: fixed;
    top: 0; bottom: 0; left: 0;
    z-index: 100;
  }
  .rail-logo {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--accent-dim);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    font-size: 15px;
    margin-bottom: 28px;
    letter-spacing: -0.5px;
  }
  .rail-nav {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
    align-items: center;
  }
  .rail-item {
    width: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 9px 0;
    border-radius: var(--radius-sm);
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .rail-item:hover { background: rgba(255,255,255,0.04); color: var(--text2); }
  .rail-item.active { color: var(--accent); background: var(--accent-dim2); }
  .rail-item svg { width: 21px; height: 21px; }
  .rail-item span { font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em; }

  /* ── 內容區（左側導覽欄之外的全部） ── */
  .main-area {
    margin-left: var(--rail-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .top-bar {
    height: 64px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .top-bar-title {
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .top-bar-title span { color: var(--accent); }
  .top-bar-tagline {
    font-size: 12px;
    color: var(--text3);
    margin-left: 10px;
    font-weight: 500;
  }
  .top-bar-meta {
    font-size: 12px;
    color: var(--text3);
  }

  /* ── 主區 + 右側欄 並排 ── */
  .content-row {
    flex: 1;
    display: flex;
    align-items: flex-start;
    gap: 28px;
    padding: 24px 32px 48px;
  }

  .main-col {
    flex: 3 1 0%;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 36px;
  }

  .side-col {
    flex: 1 1 0%;
    min-width: 280px;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    position: sticky;
    top: 24px;
    align-self: flex-start;
  }

  /* placeholder blocks for now */
  .placeholder-block {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.04);
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 13px;
  }

  /* ── Hero 區：左主播 + 右側其他進行中賽事 ── */
  .hero-row {
    display: flex;
    gap: 16px;
    align-items: stretch;
  }
  .hero-main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .hero-tabs {
    display: flex;
    gap: 22px;
    margin-bottom: 12px;
  }
  .hero-tab {
    font-size: 14px;
    font-weight: 700;
    color: var(--text3);
    cursor: pointer;
    padding-bottom: 8px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .hero-tab.active { color: var(--text); border-color: var(--accent); }
  .hero-tab:hover:not(.active) { color: var(--text2); }

  .hero-panel-wrap {
    position: relative;
    flex: 1;
  }
  .hero-panel {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    aspect-ratio: 16/7.2;
    background: linear-gradient(135deg, #1a2240 0%, #0d1830 50%, #1a2840 100%);
    display: flex;
    align-items: flex-end;
  }
  .hero-panel-img {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
  }
  .hero-panel-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(11,16,32,0.95) 0%, rgba(11,16,32,0.35) 48%, transparent 100%);
  }
  .hero-panel-content {
    position: relative;
    width: 100%;
    padding: 26px 30px;
  }
  .hero-evt-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .hero-evt-sub {
    font-size: 13px;
    color: var(--text2);
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hero-live-badge {
    background: var(--live-red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.08em;
  }
  .hero-bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    gap: 14px;
  }
  .hero-streamer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .hero-avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.25);
    flex-shrink: 0;
  }
  .hero-streamer-name { font-size: 15px; font-weight: 700; }
  .hero-watching-label { font-size: 12px; color: var(--text3); margin-left: 3px; }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px 22px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: filter 0.15s;
  }
  .btn-primary:hover { filter: brightness(1.1); }

  /* Hero 左右切換箭頭 */
  .hero-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(11,16,32,0.55);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 5;
    transition: background 0.15s;
    opacity: 0;
  }
  .hero-panel-wrap:hover .hero-arrow { opacity: 1; }
  .hero-arrow:hover { background: rgba(168,85,247,0.5); }
  .hero-arrow.prev { left: 14px; }
  .hero-arrow.next { right: 14px; }
  .hero-arrow svg { width: 18px; height: 18px; }
  .hero-arrow.disabled { opacity: 0 !important; pointer-events: none; }

  /* Hero 點點指示器 */
  .hero-dots {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 5;
  }
  .hero-dot {
    width: 6px; height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.35);
    cursor: pointer;
    border: none;
    transition: width 0.2s, background 0.2s;
  }
  .hero-dot.active { width: 18px; background: var(--accent); }

  /* ── 右側：其他進行中賽事 ── */
  .rail-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.04);
    overflow: hidden;
  }
  .rail-card-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .rail-card-header h3 {
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.02em;
  }
  .other-event-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    border-top: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .other-event-item:hover { background: rgba(255,255,255,0.03); }
  .other-event-item.active { background: var(--accent-dim2); }
  .other-event-thumb {
    width: 52px; height: 36px;
    border-radius: 6px;
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
    background-color: var(--card2);
  }
  .other-event-info { min-width: 0; flex: 1; }
  .other-event-name {
    font-size: 12.5px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .other-event-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .live-dot-sm {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--live-red);
    flex-shrink: 0;
  }

  /* ── 觀賽直播／官方主台 網格 ── */
  .grid-section {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .grid-section-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .grid-section-header h2 {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.2px;
  }
  .grid-section-count {
    font-size: 12px;
    color: var(--text3);
    font-weight: 600;
  }
  .stream-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .stream-card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .stream-card:hover {
    border-color: rgba(168,85,247,0.35);
    transform: translateY(-2px);
  }
  .stream-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #1a2240, #2a3460);
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .stream-live-dot {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--live-red);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.06em;
  }
  .stream-viewers {
    position: absolute;
    bottom: 8px; left: 8px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .stream-info { padding: 10px 12px 12px; }
  .stream-name {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stream-game {
    font-size: 11.5px;
    color: var(--text3);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Banner 輪播 ── */
  .banner-carousel {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    aspect-ratio: 16/4.2;
    background: var(--card2);
  }
  .banner-slide {
    position: absolute;
    inset: 0;
    display: none;
    background-size: cover;
    background-position: center;
  }
  .banner-slide.active { display: block; }
  .banner-slide-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(100deg, rgba(11,16,32,0.92) 0%, rgba(11,16,32,0.55) 55%, rgba(11,16,32,0.15) 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 36px;
  }
  .banner-slide-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .banner-slide-desc {
    font-size: 12.5px;
    color: var(--text2);
  }
  .banner-dots {
    position: absolute;
    bottom: 12px;
    right: 16px;
    display: flex;
    gap: 5px;
  }
  .banner-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    border: none;
    cursor: pointer;
  }
  .banner-dot.active { background: var(--accent); width: 14px; border-radius: 3px; }

  /* ── 右側欄：現正進行中／近期賽事 列表 ── */
  .rail-card-header .more-link {
    font-size: 11.5px;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
  }
  .rail-list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-top: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: background 0.15s;
  }
  .rail-list-item:hover { background: rgba(255,255,255,0.03); }
  .rail-list-thumb {
    width: 40px; height: 40px;
    border-radius: 8px;
    background: var(--card2);
    flex-shrink: 0;
    background-size: cover;
    background-position: center;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .rail-list-info { min-width: 0; flex: 1; }
  .rail-list-name {
    font-size: 12.5px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rail-list-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rail-list-empty {
    padding: 24px 16px;
    text-align: center;
    color: var(--text3);
    font-size: 12px;
  }

  /* ── 分頁切換 ── */
  .page-view { display: none; }
  .page-view.active { display: flex; }

  /* ── 直播頁 ── */
  .live-page-header {
    display: flex;
    align-items: center;
    gap: 22px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .live-page-title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .live-title-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--live-red);
    box-shadow: 0 0 0 3px rgba(255,68,68,0.2);
  }
  .filter-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--text2);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .chip:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  .chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .offline-toggle-row { margin: 32px 0 16px; }
  .offline-toggle-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 0;
    transition: color 0.15s;
  }
  .offline-toggle-btn:hover { color: var(--text2); }
  .offline-toggle-line { flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
  .offline-toggle-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 11.5px;
    white-space: nowrap;
  }
  .offline-arrow { display: inline-block; transition: transform 0.25s ease; font-size: 11px; }
  .offline-toggle-btn.open .offline-arrow { transform: rotate(90deg); }
  .offline-grid .stream-card { opacity: 0.45; }
  .offline-grid .stream-card:hover { opacity: 0.8; }

  /* ── 賽事頁 ── */
  .events-page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .events-page-header h2 { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
  .tw-toggle-row { display: flex; align-items: center; gap: 9px; }
  .toggle-label { font-size: 12.5px; color: var(--text2); }
  .toggle {
    width: 36px; height: 20px;
    background: var(--card2);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08);
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(16px); }

  .tabs {
    display: flex;
    gap: 28px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    margin-bottom: 22px;
  }
  .tab {
    padding: 0 0 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text2); }

  .events-panel { display: none; }
  .events-panel.active { display: block; }

  .event-card-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .evcard {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 18px;
    border: 1px solid rgba(255,255,255,0.04);
    transition: border-color 0.15s;
  }
  .evcard:hover { border-color: rgba(168,85,247,0.25); }
  .evcard-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .evcard-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 7px; }
  .evcard-name {
    font-size: 15.5px;
    font-weight: 700;
    letter-spacing: -0.2px;
    line-height: 1.3;
  }
  .evcard-date { font-size: 12px; color: var(--text2); margin-top: 5px; }
  .evcard-desc { font-size: 12px; color: var(--text3); margin-top: 8px; line-height: 1.5; }
  .evcard-schedule-btn {
    padding: 7px 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 11.5px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="app-shell">
  <!-- 左側導覽欄 -->
  <nav class="side-rail">
    <div class="rail-logo">62</div>
    <div class="rail-nav">
      <button class="rail-item" data-page="live">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M7.76 16.24a6 6 0 0 1 0-8.49"/><path d="M20.07 4.93a10 10 0 0 1 0 14.14"/><path d="M3.93 19.07a10 10 0 0 1 0-14.14"/>
        </svg>
        <span>直播</span>
      </button>
      <button class="rail-item active" data-page="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>

const SHEET = name =>
`https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?sheet=${encodeURIComponent(name)}&tqx=out:json`;

async function loadSheet(name){

    const res = await fetch(SHEET(name));

    const text = await res.text();

    const json = JSON.parse(
        text.substring(47).slice(0,-2)
    );

    return json.table.rows.map(r=>{

        const obj={};

        json.table.cols.forEach((c,i)=>{

            obj[c.label]=r.c?.[i]?.v ?? "";

        });

        return obj;

    });

}

// 建立一個獨立的輪播實例（各自有自己的 index/timer，互不影響）
function createBannerCarousel(containerId, slides) {
  let index = 0;
  let timer = null;

  function render() {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = slides.map((b, i) => `
      <div class="banner-slide${i === index ? ' active' : ''}" style="background-image:url(${b.img})">
        <div class="banner-slide-overlay">
          <div class="banner-slide-title">${b.title}</div>
          <div class="banner-slide-desc">${b.desc}</div>
        </div>
      </div>`
    ).join('') + (slides.length > 1 ? `
      <div class="banner-dots">
        ${slides.map((_, i) => `<button class="banner-dot${i === index ? ' active' : ''}" data-idx="${i}"></button>`).join('')}
      </div>` : '');

    el.querySelectorAll('.banner-dot').forEach(d => {
      d.addEventListener('click', () => { index = Number(d.dataset.idx); render(); restartTimer(); });
    });
  }

  function restartTimer() {
    if (timer) clearInterval(timer);
    if (slides.length > 1) {
      timer = setInterval(() => { index = (index + 1) % slides.length; render(); }, 5000);
    }
  }

  render();
  restartTimer();
}
