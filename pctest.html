<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>623Hub — 台灣格鬥遊戲賽事與直播資訊（電腦版真實串接版）</title>
<style>
  :root {
    --bg: #0B1020;
    --bg2: #131829;
    --card: #1C2236;
    --card2: #222840;
    --accent: #A855F7;
    --accent-dim: rgba(168,85,247,0.12);
    --accent-dim2: rgba(168,85,247,0.06);
    --text: #FFFFFF;
    --text2: #A0A8C0;
    --text3: #666A7A;
    --live-red: #FF4444;
    --radius: 12px;\n    --radius-sm: 8px;
    --rail-w: 88px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  a { text-decoration: none; color: inherit; }

  body {
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ══ 側邊導覽列 (Rail Nav) ══ */
  .rail-nav {
    width: var(--rail-w);
    background: var(--bg2);
    border-right: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 0;
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    z-index: 100;
  }

  .logo {
    font-weight: 900;
    font-size: 20px;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #FFF, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 40px;
  }

  .nav-menu {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    align-items: center;
  }

  .nav-item {
    width: 64px;
    height: 64px;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    gap: 4px;
  }
  .nav-item svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
  }
  .nav-item span {
    font-size: 11px;
    font-weight: 500;
  }
  .nav-item:hover {
    background: rgba(255,255,255,0.03);
    color: var(--text);
  }
  .nav-item.active {
    background: var(--accent-dim);
    color: var(--accent);
  }

  /* ══ 主要內容區 ══ */
  .main-content {
    margin-left: var(--rail-w);
    flex: 1;
    padding: 24px 40px 60px 40px;
    max-width: 1400px;
  }

  /* 頂部列 */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .search-box {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 8px 16px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 320px;
  }
  .search-box input {
    background: transparent;
    border: none;
    color: var(--text);
    outline: none;
    width: 100%;
    font-size: 13px;
  }
  .search-box svg {
    width: 16px;
    height: 16px;
    fill: var(--text3);
  }

  .meta-info {
    font-size: 12px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* 區塊通用 */
  .main-section {
    margin-bottom: 40px;
  }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ══ Banner 輪播區 ══ */
  .banner-area {
    height: 220px;
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    margin-bottom: 32px;
  }
  .banner-track {
    display: flex;
    height: 100%;
    width: 100%;
    position: relative;
  }
  .banner-slide {
    min-width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
    display: flex;
    align-items: flex-end;
    background-size: cover;
    background-position: center;
  }
  .banner-slide.active {
    opacity: 1;
    position: relative;
  }
  .banner-slide::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(11,16,32,0.95) 10%, rgba(11,16,32,0.3) 60%, transparent);
  }
  .banner-content {
    position: relative;
    z-index: 2;
    padding: 32px;
    max-width: 600px;
  }
  .banner-title {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 6px;
    color: #FFF;
  }
  .banner-subtitle {
    font-size: 14px;
    color: var(--text2);
  }

  /* ══ 正在直播 ══ */
  .live-dot {
    width: 8px;
    height: 8px;
    background: var(--live-red);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.9); opacity: 0.6; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(0.9); opacity: 0.6; }
  }

  .live-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  .live-card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.02);
    transition: transform 0.2s, border-color 0.2s;
    cursor: pointer;
  }
  .live-card:hover {
    transform: translateY(-2px);
    border-color: rgba(168,85,247,0.3);
  }
  .live-img-wrap {
    position: relative;
    padding-top: 56.25%; /* 16:9 */
    background: #000;
  }
  .live-img {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover;
  }
  .live-tag {
    position: absolute;
    top: 10px; left: 10px;
    background: var(--live-red);
    color: #FFF;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .live-viewers {
    position: absolute;
    bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.7);
    color: #FFF;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .live-body {
    padding: 14px;
  }
  .live-streamer {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .live-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    height: 38px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .live-game {
    font-size: 11px;
    color: var(--text3);
  }

  /* ══ 賽事大廳區 ══ */
  .events-dashboard {
    display: grid;
    grid-template-columns: 2.2fr 1fr;
    gap: 32px;
  }

  /* 切換標籤 */
  .tabs-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 20px;
    padding-bottom: 2px;
  }
  .tabs {
    display: flex;
    gap: 24px;
  }
  .tab {
    font-size: 15px;
    font-weight: 600;
    color: var(--text2);
    padding-bottom: 12px;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent);
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* 台灣限定開關 */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    user-select: none;
  }
  .toggle-btn {
    width: 36px;
    height: 20px;
    background: var(--card2);
    border-radius: 10px;
    position: relative;
    transition: background 0.2s;
  }
  .toggle-btn::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: var(--text2);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-wrap.on .toggle-btn {
    background: var(--accent);
  }
  .toggle-wrap.on .toggle-btn::after {
    transform: translateX(16px);
    background: #FFF;
  }

  /* 面板切換控制 */
  .panel { display: none; }
  .panel.active { display: block; }

  /* 賽事列表 (卡片排版) */
  .rail-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .rail-list-empty {
    padding: 40px;
    text-align: center;
    color: var(--text3);
    background: var(--card2);
    border-radius: var(--radius);
    border: 1px dashed rgba(255,255,255,0.05);
  }

  .evcard {
    display: flex;
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.02);
    transition: border-color 0.2s, transform 0.2s;
  }
  .evcard:hover {
    border-color: rgba(168,85,247,0.25);
    transform: translateX(2px);
  }
  .evcard-img-wrap {
    width: 180px;
    position: relative;
    background: #000;
    flex-shrink: 0;
  }
  .evcard-img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .evcard-badge {
    position: absolute;
    top: 8px; left: 8px;
    background: var(--accent);
    color: #FFF;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
  }
  .evcard-badge.live {
    background: var(--live-red);
    animation: pulse 1.5s infinite;
  }
  .evcard-body {
    padding: 16px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .evcard-game {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .evcard-title {
    font-size: 15px;
    font-weight: 700;
    color: #FFF;
    margin-bottom: 12px;
  }
  .evcard-meta {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px 16px;
    margin-bottom: 12px;
  }
  .evcard-meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text2);
    font-size: 12px;
  }
  .evcard-meta-item svg {
    width: 14px; height: 14px;
    fill: var(--text3);
    flex-shrink: 0;
  }
  .evcard-meta-item span {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .evcard-desc {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.5;
    border-top: 1px solid rgba(255,255,255,0.04);
    padding-top: 10px;
    margin-top: auto;
  }

  /* 右側常設聯賽 */
  .league-panel {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.03);
    align-self: flex-start;
  }
  .league-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .league-title svg {
    width: 16px; height: 16px; fill: var(--accent);
  }
  .league-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .league-item {
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .league-item:hover {
    border-color: rgba(255,255,255,0.05);
    background: var(--card2);
  }
  .league-game {
    font-size: 10px;
    color: var(--text3);
    font-weight: 700;
    margin-bottom: 2px;
  }
  .league-name {
    font-size: 13px;
    font-weight: 600;
    color: #FFF;
    margin-bottom: 6px;
  }
  .league-info {
    font-size: 11px;
    color: var(--text2);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>

    <div class="nav-menu">

          <div class="banner-content">

  <script>
    // 1. 全域變數定義 (與手機版對應的 Google Sheet ID)
    const SPREADSHEET_ID = '1BxiMVs0XRA5nFMdKvXdBAnupvc76LYWMvI10t45szW4';
    
    let eventsTab = 'featured'; 
    let twOnly = false;

    // 用於存放真實資料的陣列
    let REAL_EVENTS_FEATURED = [];
    let REAL_EVENTS_SOCIAL = [];
    let REAL_EVENTS_LEAGUE = [];

    // 2. 共用 Google Sheets JSON 資料擷取器
    async function fetchSheetData(sheetName) {
      const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
      const res = await fetch(url);
      const text = await res.text();
      // 解析 Google gviz json 格式
      const startIdx = text.indexOf('{');
      const endIdx = text.lastIndexOf('}');
      if (startIdx === -1 || endIdx === -1) return [];
      
      const json = JSON.parse(text.substring(startIdx, endIdx + 1));
      const table = json.table;
      if (!table || !table.rows) return [];

      // 自動讀取首列當作欄位標籤 (對照欄位名稱)
      const cols = table.cols.map(c => c.label ? c.label.trim() : '');
      
      return table.rows.map(row => {
        const item = {};
        row.c.forEach((cell, idx) => {
          const label = cols[idx];
          if (label) {
            item[label] = cell ? cell.v : '';
          }
        });
        return item;
      });
    }

    // 3. 渲染動態賽事卡片 (精選與社群)
    function renderEvCard(ev) {
      if (twOnly && !ev.isTaiwan) return '';

      const badgeHtml = ev.isLive 
        ? `<span class="evcard-badge live">LIVE</span>`
        : (ev.badge ? `<span class="evcard-badge">${ev.badge}</span>` : '');

      return `
        <a href="${ev.link}" target="_blank" class="evcard">
          <div class="evcard-img-wrap">
            <img class="evcard-img" src="${ev.image || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=600&q=80'}" alt="${ev.title}" loading="lazy">
            ${badgeHtml}
          </div>
          <div class="evcard-body">
            <div class="evcard-game">${ev.game}</div>
            <div class="evcard-title">${ev.title}</div>
            <div class="evcard-meta">
              <div class="evcard-meta-item">
                <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
                <span>${ev.date}</span>
              </div>
              <div class="evcard-meta-item">
                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
                <span>${ev.time}</span>
              </div>
              <div class="evcard-meta-item">
                <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <span>${ev.location}</span>
              </div>
              <div class="evcard-meta-item">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span>${ev.host}</span>
              </div>
            </div>
            ${ev.desc ? `<div class="evcard-desc">${ev.desc}</div>` : ''}
          </div>
        </a>
      `;
    }

    // 4. 渲染常設聯賽卡片 (右側)
    function renderLeagueCard(ev) {
      if (twOnly && !ev.isTaiwan) return '';
      return `
        <a href="${ev.link}" target="_blank" class="league-item" style="display: block;">
          <div class="league-game">${ev.game}</div>
          <div class="league-name">${ev.title}</div>
          <div class="league-info">
            <span>${ev.date} ${ev.time}</span>
            <span style="color: var(--accent);">${ev.host}</span>
          </div>
        </a>
      `;
    }

    // 5. 刷新賽事 UI 渲染
    function renderEventsPage() {
      const featuredHtml = REAL_EVENTS_FEATURED.map(renderEvCard).join('');
      const socialHtml = REAL_EVENTS_SOCIAL.map(renderEvCard).join('');
      const leagueHtml = REAL_EVENTS_LEAGUE.map(renderLeagueCard).join('');

      document.getElementById('events-featured-grid').innerHTML = featuredHtml || `<div class="rail-list-empty">目前沒有符合條件的精選賽事</div>`;
      document.getElementById('events-social-grid').innerHTML = socialHtml || `<div class="rail-list-empty">目前沒有符合條件的社群活動</div>`;
      document.getElementById('events-league-grid').innerHTML = leagueHtml || `<div class="rail-list-empty">目前沒有符合條件的常設聯賽</div>`;
    }

    // 6. 載入並更新所有賽事資料
    async function loadEvents() {
      try {
        const rows = await fetchSheetData('Events');
        const allEvents = rows.map(item => ({
          title: item.title || '',
          game: item.game || '',
          date: item.date || '',
          time: item.time || '',
          location: item.location || '',
          host: item.host || '',
          link: item.link || '#',
          image: item.image || '',
          desc: item.desc || '',
          type: item.type ? item.type.toLowerCase().trim() : 'featured',
          isTaiwan: String(item.isTaiwan).toUpperCase() === 'Y' || item.isTaiwan === true || item.isTaiwan === 1,
          isLive: String(item.isLive).toUpperCase() === 'Y' || item.isLive === true || item.isLive === 1,
          badge: item.badge || ''
        }));

        // 分類過濾
        REAL_EVENTS_FEATURED = allEvents.filter(ev => ev.type === 'featured');
        REAL_EVENTS_SOCIAL = allEvents.filter(ev => ev.type === 'community' || ev.type === 'social');
        REAL_EVENTS_LEAGUE = allEvents.filter(ev => ev.type === 'league');

        renderEventsPage();
      } catch (err) {
        console.error("載入賽事失敗:", err);
      }
    }

    // 7. 載入動態直播資料 (Live Sheet)
    async function loadLiveStreams() {
      try {
        const rows = await fetchSheetData('Live');
        const liveGrid = document.getElementById('live-grid');
        
        // 過濾出正在直播的資料
        const activeStreams = rows.filter(r => String(r.isLive).toUpperCase() === 'Y' || r.isLive === true || r.isLive === 1);
        
        if (activeStreams.length === 0) {
          liveGrid.innerHTML = `<div class="rail-list-empty" style="grid-column: span 4;">目前沒有社群實況主正在直播</div>`;
          return;
        }

        liveGrid.innerHTML = activeStreams.map(stream => `
          <a href="${stream.link || '#'}" target="_blank" class="live-card">
            <div class="live-img-wrap">
              <img class="live-img" src="${stream.image || 'https://images.unsplash.com/photo-1560253023-3ec5d502959f?auto=format&fit=crop&w=400&q=80'}" alt="直播封面">
              <span class="live-tag">LIVE</span>
              <span class="live-viewers">${stream.viewers || '0'} 觀看</span>
            </div>
            <div class="live-body">
              <div class="live-streamer">${stream.streamer || '未知實況主'}</div>
              <div class="live-title">${stream.title || '格鬥遊戲直播中'}</div>
              <div class="live-game">${stream.game || ''}</div>
            </div>
          </a>
        `).join('');
      } catch (err) {
        console.error("載入直播失敗:", err);
      }
    }

    // 8. 載入動態橫幅資料 (Banners Sheet)
    async function loadBanners() {
      try {
        const rows = await fetchSheetData('Banners');
        const track = document.getElementById('banner-track');
        if (rows.length === 0) return;

        track.innerHTML = rows.map((b, idx) => `
          <a href="${b.link || '#'}" target="_blank" class="banner-slide ${idx === 0 ? 'active' : ''}" style="background-image: url('${b.image}')">
            <div class="banner-content">
              <div class="banner-title">${b.title || ''}</div>
              <div class="banner-subtitle">${b.subtitle || ''}</div>
            </div>
          </a>
        `).join('');

        // 啟動 Banner 輪播計時器
        initBannerSlider();
      } catch (err) {
        console.error("載入大圖失敗:", err);
      }
    }

    // Banner 自動切換邏輯
    let bannerIndex = 0;
    let bannerTimer = null;
    function initBannerSlider() {
      if (bannerTimer) clearInterval(bannerTimer);
      const slides = document.querySelectorAll('.banner-slide');
      if (slides.length <= 1) return;

      bannerTimer = setInterval(() => {
        slides[bannerIndex].classList.remove('active');
        bannerIndex = (bannerIndex + 1) % slides.length;
        slides[bannerIndex].classList.add('active');
      }, 5000); // 每 5 秒切換一次
    }

    // 更新時間戳記
    function updateLastUpdated() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      document.getElementById('sync-time').innerText = timeStr;
      document.getElementById('sync-status').innerText = '已與雲端同步';
    }

    // 9. 頁面初始化與定時刷新排程 (比照手機版排程機制)
    async function initAllData() {
      document.getElementById('sync-status').innerText = '正在讀取雲端資料...';
      await Promise.all([loadBanners(), loadLiveStreams(), loadEvents()]);
      updateLastUpdated();
    }

    document.addEventListener("DOMContentLoaded", () => {
      initAllData();

      // 每 10 分鐘自動刷新一次完整資料
      setInterval(() => {
        initAllData();
      }, 10 * 60 * 1000);
    });

    // 10. UI 互動事件監聽 (台灣限定開關、頁籤切換)
    document.getElementById('tw-toggle').addEventListener('click', function() {
      twOnly = !twOnly;
      this.classList.toggle('on', twOnly);
      renderEventsPage();
    });

    document.querySelectorAll('#events-tabs .tab').forEach(tab => {
      tab.addEventListener('click', () => {
        eventsTab = tab.dataset.tab;
        document.querySelectorAll('#events-tabs .tab').forEach(t => t.classList.toggle('active', t === tab));
        document.getElementById('events-featured-panel').classList.toggle('active', eventsTab === 'featured');
        document.getElementById('events-community-panel').classList.toggle('active', eventsTab === 'community');
      });
    });
  </script>
</body>
</html>
